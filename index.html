<style>

#fb-login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0D1B2A,#1B5E20);display:flex;align-items:center;justify-content:center;z-index:99999}
.fb-box{background:#fff;border-radius:18px;padding:28px 22px;width:90%;max-width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.fb-logo{width:70px;height:70px;border-radius:50%;object-fit:cover;margin-bottom:10px}
.fb-title{font-size:18px;font-weight:800;color:#1B3A4B;margin-bottom:2px}
.fb-sub{font-size:11px;color:#90A4AE;margin-bottom:20px}
.fb-inp{width:100%;padding:11px 13px;border:1.5px solid #E0E0E0;border-radius:9px;font-size:14px;margin-bottom:10px;outline:none;box-sizing:border-box}
.fb-inp:focus{border-color:#2E7D32}
.fb-btn{width:100%;padding:12px;background:#1B3A4B;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.fb-btn:active{background:#0D1B2A}
.fb-err{color:#C62828;font-size:12px;margin-top:8px;min-height:16px}
.fb-view-badge{position:fixed;top:0;left:0;right:0;background:#E65100;color:#fff;text-align:center;font-size:11px;font-weight:700;padding:3px;z-index:9998;letter-spacing:.5px}

/* ── Reset ───────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --touch:42px;
  --r:9px;
  --pad:11px;
  --gap:7px;
  --fs-xs:10px;
  --fs-sm:12px;
  --fs-base:14px;
  --fs-lg:16px;
  --col-primary:#1565C0;
  --col-dark:#1B3A4B;
  --col-card:#fff;
  --col-bg:#ECEFF1;
  --col-border:#CFD8DC;
  --col-text:#263238;
  --col-muted:#78909C;
}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--col-bg);min-height:100vh;color:var(--col-text);-webkit-tap-highlight-color:transparent}

/* ── Header ─────────────────────────────────────────── */
.hdr{background:linear-gradient(135deg,#0D1B2A,var(--col-dark));padding:10px var(--pad);display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;min-height:52px}
.hdr h1{color:#fff;font-size:var(--fs-base);font-weight:700;line-height:1.2}
.hdr-sub{color:#fff;font-size:var(--fs-xs)}
.hdr-stats{margin-left:auto;display:flex;gap:10px}
.hs{text-align:center}
.hs-v{font-size:var(--fs-base);font-weight:700}
.hs-l{font-size:var(--fs-xs);color:#78909C}

/* ── Nav ─────────────────────────────────────────────── */
.nav{background:var(--col-dark);display:flex;padding:4px 8px;gap:3px;overflow-x:auto;position:sticky;top:52px;z-index:99}
.nav::-webkit-scrollbar{height:2px}
.nav::-webkit-scrollbar-thumb{background:#455A64}
/* Tab buttons — min 36px tall so rows stay compact but fingers land safely */
.tb{
  padding:7px 13px;
  border:none;border-radius:var(--r);
  cursor:pointer;font-size:var(--fs-sm);
  white-space:nowrap;font-family:inherit;
  min-height:36px;
  transition:background .15s,color .15s;
}
.tb.on{font-weight:700;color:#fff}
.tb:not(.on){background:transparent;color:#90A4AE}

/* ── Main content ───────────────────────────────────── */
.main{padding:var(--pad);max-width:700px;margin:0 auto;display:flex;flex-direction:column;gap:var(--gap)}

/* ── Card ────────────────────────────────────────────── */
.card{background:var(--col-card);border-radius:var(--r);padding:var(--pad);box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:0}
/* legacy margin support (cards not in .main flex) */
.card+.card{margin-top:5px}

/* ── Buttons — min 44px touch target ────────────────── */
.btn{
  padding:8px 14px;
  border:none;border-radius:var(--r);
  cursor:pointer;font-size:var(--fs-sm);font-weight:600;
  font-family:inherit;
  min-height:40px;
  display:inline-flex;align-items:center;justify-content:center;
  gap:5px;
  transition:opacity .15s;
  -webkit-user-select:none;user-select:none;
}
.btn:active{opacity:.75}

/* ── Form inputs ─────────────────────────────────────── */
.fi{
  padding:8px 10px;
  border:1.5px solid var(--col-border);
  border-radius:var(--r);
  font-size:var(--fs-base);
  outline:none;font-family:inherit;
  min-height:40px;
  width:100%;
  transition:border-color .15s;
}
.fi:focus{border-color:var(--col-primary)}
select.fi{padding-right:8px}

/* ── Search bar ──────────────────────────────────────── */
.srch{
  padding:8px 10px;
  border:1.5px solid var(--col-border);
  border-radius:var(--r);
  font-size:var(--fs-base);
  outline:none;font-family:inherit;
  flex:1;min-width:0;
  min-height:40px;
  transition:border-color .15s;
}
.srch:focus{border-color:var(--col-primary)}

/* ── Badges ──────────────────────────────────────────── */
.badge{
  padding:4px 10px;
  border-radius:20px;
  font-size:var(--fs-sm);font-weight:600;
  display:inline-flex;align-items:center;
  white-space:nowrap;
}

/* ── Record card (rc) ───────────────────────────────── */
.rc{border-radius:var(--r);border:1.5px solid;margin-bottom:var(--gap);overflow:hidden}
.rc-hdr{display:flex;align-items:center;gap:8px;padding:10px var(--pad);flex-wrap:wrap}

/* ── Mini stat widgets ───────────────────────────────── */
.mini{background:#fff;border-radius:var(--r);padding:6px 12px;text-align:center;min-width:64px}
.mini-v{font-size:var(--fs-lg);font-weight:700}
.mini-l{font-size:var(--fs-xs);color:var(--col-muted)}

/* ── Empty state ─────────────────────────────────────── */
.empty{text-align:center;padding:48px var(--pad);color:#B0BEC5;background:#fff;border-radius:var(--r)}

/* ── Upload zone ─────────────────────────────────────── */
.upload-zone{border:3px dashed #90CAF9;border-radius:12px;padding:28px var(--pad);text-align:center;cursor:pointer;transition:all .2s;background:#F8FBFF}
.upload-zone:hover,.upload-zone.drag{border-color:var(--col-primary);background:#E3F2FD}

/* ── Formula chips ───────────────────────────────────── */
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;font-size:var(--fs-sm);font-weight:600;margin:2px;cursor:pointer}
.chip-plus{background:#E8F5E9;color:#2E7D32;border:1px solid #A5D6A7}
.chip-minus{background:#FFEBEE;color:#C62828;border:1px solid #EF9A9A}

/* ── Diff colors ─────────────────────────────────────── */
.pos{color:#1B5E20;font-weight:700}
.neg{color:#B71C1C;font-weight:700}
.zero{color:#9E9E9E}

/* ── Settings sub-tabs ───────────────────────────────── */
.stab{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:var(--gap)}
.stb{
  padding:8px 14px;border:none;border-radius:var(--r);
  cursor:pointer;font-size:var(--fs-sm);font-weight:600;
  font-family:inherit;
  min-height:38px;
  display:inline-flex;align-items:center;
}
.stb.on{background:#455A64;color:#fff}
.stb:not(.on){background:#ECEFF1;color:#546E7A}

/* ── Table ───────────────────────────────────────────── */
.mtbl{width:100%;border-collapse:collapse;font-size:var(--fs-sm)}
.mtbl th{padding:6px 8px;background:#37474F;color:#fff;text-align:left;font-weight:600}
.mtbl td{padding:5px 8px;border-bottom:1px solid #EFEFEF;vertical-align:middle}

/* ── Scrollbars ──────────────────────────────────────── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#90A4AE;border-radius:3px}

/* ── Mobile tweaks ───────────────────────────────────── */
@media(max-width:480px){
  .hdr-stats{display:none}
  .main{padding:10px}
}
</style>

function normalizeNum(str){

function getTotalKg(items,p){

  return t;
}

const REC_TYPE_MAP={inventories:'inventory',receivables:'receivables',returns:'returns',sales:'sales',daySales:'daysales',stockSummaries:'stocksummary',waste:'waste',production:'production'};

function findRecord(id){
  for(const[key,type] of Object.entries(REC_TYPE_MAP)){
    const r=(D[key]||[]).find(r=>r.id===id);
    if(r)return{record:r,type,key:type}; // key = type value (inventory/receivables/etc)
  }return null;
}
function getRecordLabel(id,short=false){
  const f=findRecord(id);if(!f)return'(deleted)';
  const{record:r,type:t}=f;
  const inf=TYPE_INFO[t]||{emoji:'📄',color:'#546E7A'};
  const label=short?`${inf.emoji} ${r.date}${r.notes?' '+r.notes:''}`:`${inf.emoji} ${r.date}${r.notes?' — '+r.notes:''}`;
  return{label,color:inf.color,emoji:inf.emoji,type:t};
}
function calcFormula(ops){
  const tot={};PRODUCTS.forEach(p=>tot[p]={kg:0,pcs:0});
  ops.filter(op=>op.op!=='skip').forEach(op=>{
    const f=findRecord(op.id);if(!f)return;
    const sign=op.op==='+'?1:-1;
    PRODUCTS.filter(p=>!FORMULA_EXCLUDED.includes(p)).forEach(p=>{
      tot[p].kg+=sign*(parseFloat(f.record.items?.[p]?.kg)||0);
      tot[p].pcs+=sign*(parseFloat(f.record.items?.[p]?.pcs)||0);
    });
  });return tot;
}

function renderFormulaDetail(fid){
  const fa=fid==='a'?FA:FB;
  const fcolor=fid==='a'?'#4527A0':'#00695C';
  const fname=fid==='a'?'Formula A':'Formula B';
  const ops=fa.filter(op=>op.op!=='skip');
  if(!ops.length)return`<div style="color:#90A4AE;font-size:12px;padding:8px">No records in ${fname}</div>`;

  // Build record columns
  const cols=ops.map(op=>{
    const f=findRecord(op.id);if(!f)return null;
    const sign=op.op==='+'?1:-1;
    const sup=(f.record.notes||'').replace(/Receivables|Inventory|Returns|Waste|Sales/gi,'').replace(/[—\-]/,'').trim().slice(0,12);
    const typeInfo={
      inventory:{emoji:'📦',name:'Inventory'},
      receivables:{emoji:'📥',name:'Receivables'},
      returns:{emoji:'🔄',name:'Returns'},
      sales:{emoji:'📤',name:'Sales'},
      daysales:{emoji:'☀️',name:'Day Sales'},
      stocksummary:{emoji:'📊',name:'Sys.Stock'},
      waste:{emoji:'♻️',name:'Waste'}
    };
    const ti2=typeInfo[f.key]||{emoji:'📋',name:f.key};
    return{op,f,sign,typeEmoji:ti2.emoji,typeName:ti2.name,date:f.record.date.slice(5),sup:(f.record.notes||'').replace(/Receivables|Inventory|Returns|Waste|Sales/gi,'').replace(/[—\-]/g,'').trim().slice(0,12)};
  }).filter(Boolean);

  // Active products only
  const activeProd=PRODUCTS.filter(p=>!FORMULA_EXCLUDED.includes(p)&&cols.some(({f})=>{
    return(parseFloat(f.record.items?.[p]?.kg)||0)+(parseFloat(f.record.items?.[p]?.pcs)||0)>0;
  }));

  const stickyTh='position:sticky;left:0;z-index:2;background:#263238;padding:6px 8px;white-space:nowrap;font-size:10px;font-weight:700;color:#fff;min-width:110px;border-right:2px solid rgba(255,255,255,.3);text-align:left';
  const colTh=`text-align:center;padding:5px 6px;font-size:9px;font-weight:700;color:#fff;background:${fcolor};min-width:60px;border-right:1px solid rgba(255,255,255,.2);white-space:pre-line;line-height:1.3`;
  const totTh=`text-align:center;padding:5px 6px;font-size:10px;font-weight:800;color:#fff;background:#263238;min-width:65px;white-space:nowrap`;
  const stickyTd=(txt,bg='#FAFAFA')=>`position:sticky;left:0;z-index:1;background:${bg};padding:5px 8px;font-size:11px;font-weight:600;color:#455A64;border-right:2px solid #E0E0E0;border-bottom:1px solid #EFEFEF;white-space:nowrap`;

  let h=`<div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:8px;border:1px solid #E0E0E0">
  <table style="border-collapse:collapse;table-layout:fixed;font-size:11px">
    <thead><tr>
      <th style="${stickyTh}">Product</th>
      ${cols.map(({sign,typeEmoji,typeName,date,sup})=>`<th style="${colTh}">
        <div style="font-size:15px;margin-bottom:1px">${typeEmoji}</div>
        <div style="font-size:9px;color:rgba(255,255,255,.75);margin-bottom:2px">${typeName}</div>
        <div style="color:${sign>0?'#A5D6A7':'#FFCC80'};font-size:13px;font-weight:800;margin-bottom:1px">${sign>0?'+':'−'}</div>
        <div style="font-size:9px;color:rgba(255,255,255,.9)">${date}</div>
        ${sup?`<div style="font-size:8px;color:rgba(255,255,255,.6);margin-top:1px">${sup}</div>`:''}
      </th>`).join('')}
      <th style="${totTh}">Total</th>
    </tr></thead>
    <tbody>
    ${activeProd.map((p,pi)=>{
      const is500=p.endsWith(' 500');
      const rowBg=pi%2===0?'#fff':'#FAFAFA';
      const isPcs=!!C_MAP[p];
      const unit=isPcs?'pcs':'kg';
      const totVal=cols.reduce((s,{f,sign})=>{
        const val=isPcs?(parseFloat(f.record.items?.[p]?.pcs)||0):(parseFloat(f.record.items?.[p]?.kg)||0);
        return s+sign*val;
      },0);
      return`<tr>
        <td style="${stickyTd(p,rowBg)}">
          ${isPcs?`<span style="color:#9C27B0;font-size:10px">↗ ${p}</span>`:`<span>${p}</span>`}
        </td>
        ${cols.map(({f,sign})=>{
          const val=isPcs?(parseFloat(f.record.items?.[p]?.pcs)||0):(parseFloat(f.record.items?.[p]?.kg)||0);
          if(val===0)return`<td style="text-align:center;padding:5px 6px;color:#E0E0E0;border-bottom:1px solid #EFEFEF;border-right:1px solid #F0F0F0;background:${rowBg}">—</td>`;
          const disp=(sign>0?'+':'-')+val.toFixed(val%1===0?0:2)+' '+unit;
          return`<td style="text-align:center;padding:5px 6px;font-weight:700;color:${sign>0?'#2E7D32':'#C62828'};background:${sign>0?'#F1F8E9':'#FFF3E0'};border-bottom:1px solid #EFEFEF;border-right:1px solid #F0F0F0">${disp}</td>`;
        }).join('')}
        <td style="text-align:center;padding:5px 7px;font-weight:800;font-size:12px;color:${totVal>0?'#1565C0':totVal<0?'#C62828':'#90A4AE'};background:${totVal>0?'#E3F2FD':totVal<0?'#FFEBEE':'#F5F5F5'};border-bottom:1px solid #EFEFEF">
          ${totVal===0?'—':(totVal>0?'+':'')+totVal.toFixed(totVal%1===0?0:2)+' '+unit}
        </td>
      </tr>`;
    }).join('')}
    </tbody>
  </table></div>`;
  return h;
}

  const fa=fid==='a'?FA:FB;
  if(op==='remove'){if(fid==='a')FA=FA.filter(o=>o.id!==id);else FB=FB.filter(o=>o.id!==id);}
  else{const i=fa.findIndex(o=>o.id===id);if(i>=0)fa[i].op=op;else fa.push({id,op});}
  saveFormulas();render();
}
function removeFromFormula(fid,id){addToFormula(fid,id,'remove');}
function cycleChip(fid,id,curOp){
  // Cycle: + → - → skip → remove
  const next={'+':'-','-':'skip','skip':'remove'}[curOp]||'remove';
  addToFormula(fid,id,next);
}

const TAB_SCROLL={};let _scrollTarget=null;
let _navScrollX1=0,_navScrollX2=0; // remember nav bar horizontal scroll

function render(){
  const sy=_scrollTarget!==null?_scrollTarget:(window.scrollY||0);
  _scrollTarget=null;
  // capture current nav bar scroll positions before re-render wipes the DOM
  const nr1=document.getElementById('nav-row1'),nr2=document.getElementById('nav-row2');
  if(nr1)_navScrollX1=nr1.scrollLeft;
  if(nr2)_navScrollX2=nr2.scrollLeft;
  const{tab,view}=S;
  let h=renderHdr()+renderNav()+'<div class="main">';
  const entryTabs=['inventory','receivables','returns','waste'];
  if(entryTabs.includes(tab)){
    if(tab==='receivables'&&view==='receipt') h+=renderReceiptCalc();
    else h+=view==='list'?renderList():renderForm();
  }
  else if(tab==='sales')        h+=view==='form'?renderForm():renderSalesTab();
  else if(tab==='daysales')     h+=view==='form'?renderForm():renderDaySalesTab();
  else if(tab==='stocksummary') h+=view==='form'?renderForm():renderStockTab();
  else if(tab==='production')   h+=view==='form'?renderProductionForm():renderProductionList();
  else if(tab==='records')      h+=renderRecords();
  else if(tab==='formulaA')     h+=renderFormula('a');
  else if(tab==='formulaB')     h+=renderFormula('b');
  else if(tab==='diff')         h+=renderDiff();
  else if(tab==='settings')     h+=renderSettings();
  h+='</div>';
  document.getElementById('app').innerHTML=h;
  requestAnimationFrame(()=>{
    window.scrollTo(0,sy);
    const a=document.getElementById('nav-row1'),b=document.getElementById('nav-row2');
    if(a)a.scrollLeft=_navScrollX1;
    if(b)b.scrollLeft=_navScrollX2;
    initKbdNav();
  });
}

// ─── Enter key navigation between inputs ─────────────
function initKbdNav(){
  document.removeEventListener('keydown',_kbdEnterHandler);
  document.addEventListener('keydown',_kbdEnterHandler);
  // Set enterkeyhint so keyboard shows "Next" button
  requestAnimationFrame(()=>{
    const inputs=[...document.querySelectorAll('input:not([type=hidden]):not([type=file]),textarea')];
    inputs.forEach((el,i)=>{
      if(!el.disabled&&!el.readOnly){
        el.setAttribute('enterkeyhint', i===inputs.length-1?'done':'next');
      }
    });
  });
}
function _kbdEnterHandler(e){
  if(e.key!=='Enter'&&e.keyCode!==13)return;
  const cur=document.activeElement;
  if(!cur||!['INPUT','TEXTAREA'].includes(cur.tagName))return;
  if(cur.type==='hidden'||cur.type==='file')return;
  e.preventDefault();
  // Fire input event to ensure value is captured before moving
  cur.dispatchEvent(new Event('input',{bubbles:true}));
  cur.dispatchEvent(new Event('change',{bubbles:true}));
  const inputs=[...document.querySelectorAll('input:not([type=hidden]):not([type=file]),textarea')].filter(el=>{
    return el.offsetParent!==null&&!el.disabled&&!el.readOnly&&el.tabIndex!==-1;
  });
  const idx=inputs.indexOf(cur);
  if(idx<0)return;
  const next=inputs[idx+1];
  if(next){next.focus();next.scrollIntoView({behavior:'smooth',block:'center'});}
  else{cur.blur();}
}

function renderNav(){
  const row=(keys)=>keys.map(k=>{
    const t=TABS.find(x=>x.key===k);const a=S.tab===k;
    return`<button class="tb${a?' on':''}" style="${a?`background:${t.color}`:''}" onclick="switchTab('${k}')">${t.emoji} ${t.ar}</button>`;
  }).join('');
  return`<nav style="background:#1B3A4B;position:sticky;top:52px;z-index:99">
    <div id="nav-row1" style="display:flex;padding:3px 6px 2px;gap:2px;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.1)">${row(TABS_R1)}</div>
    <div id="nav-row2" style="display:flex;padding:2px 6px 4px;gap:2px;overflow-x:auto">${row(TABS_R2)}</div>
    ${['inventory','receivables','returns','sales','daysales','stocksummary','waste'].includes(S.tab)?`
    <div style="display:flex;align-items:center;gap:6px;padding:5px 8px;background:rgba(0,0,0,.25);border-top:1px solid rgba(255,255,255,.1);flex-wrap:wrap">
      <span style="font-size:10px;color:rgba(255,255,255,.6);white-space:nowrap">📅 From</span>
      <input type="date" value="${S.gFrom}" onchange="S.gFrom=this.value;render()"
        style="flex:1;padding:4px 5px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:rgba(255,255,255,.1);color:#fff;font-size:11px;min-width:0">
      <span style="font-size:10px;color:rgba(255,255,255,.6)">→</span>
      <input type="date" value="${S.gTo}" onchange="S.gTo=this.value;render()"
        style="flex:1;padding:4px 5px;border:1px solid rgba(255,255,255,.3);border-radius:6px;background:rgba(255,255,255,.1);color:#fff;font-size:11px;min-width:0">
      <button onclick="quickDateFilter(3)" style="border:none;background:rgba(255,255,255,.18);color:#fff;border-radius:6px;padding:4px 9px;cursor:pointer;font-size:10px;white-space:nowrap;font-weight:600">Last 3 Days</button>
      <button onclick="quickDateFilter(0)" style="border:none;background:rgba(255,255,255,.18);color:#fff;border-radius:6px;padding:4px 9px;cursor:pointer;font-size:10px;white-space:nowrap;font-weight:600">Today</button>
      ${(S.gFrom||S.gTo)?`<button onclick="S.gFrom='';S.gTo='';render()" style="border:none;background:rgba(255,100,100,.4);color:#fff;border-radius:5px;padding:4px 9px;cursor:pointer;font-size:11px;white-space:nowrap">× Clear</button>`:''}
    </div>`:''}
  </nav>`;
}

function renderList(){
  const inf=ti(S.tab),key=dk(S.tab);
  let recs=[...D[key]].sort((a,b)=>b.date.localeCompare(a.date));
  // Apply global date filter
  const from=S.gFrom,to=S.gTo;
  if(from)recs=recs.filter(r=>r.date>=from);
  if(to)recs=recs.filter(r=>r.date<=to);
  const filtered=from||to;
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:7px">
    <div><h2 style="margin:0;font-size:16px;color:${inf.color}">${inf.emoji} ${inf.ar}</h2>
    <p style="margin:2px 0 0;color:#78909C;font-size:11px">${recs.length} record(s)${filtered?' (filtered)':''}</p></div>
    <div style="display:flex;gap:5px;flex-wrap:wrap">
      ${S.tab==='receivables'?`<button class="btn" style="background:#2E7D32;color:#fff;padding:7px 16px" onclick="CWC_EXPECTED=0;CWC_ROWS=[{id:1,sh:'',ctns:'',gross:'',cwt:''}];CWC_ID=1;RC={supplier:'',date:RC.date||new Date().toISOString().split('T')[0],temp:'',ctns:{},sizePcs:{},smallPcs:10,largePcs:8,cuts:{},extraItems:{}};S.view='receipt';render()">📥 + New Receivables</button>`:`<button class="btn" style="background:${inf.color};color:#fff;padding:7px 16px" onclick="startNew()">+ New ${inf.ar}</button>`}
    </div></div>`;
  if(!recs.length){
    h+=`<div class="empty" style="border:2px dashed ${inf.border}"><div style="font-size:36px;margin-bottom:7px">${inf.emoji}</div>
      <div style="font-size:13px;font-weight:600">${S.listFrom||S.listTo?'No records in this date range':'No records yet'}</div></div>`;
  } else recs.forEach(r=>h+=renderCard(r,inf));
  return h;
}
function renderCard(r,inf){
  const kg=combinedKg(r).toFixed(2),cnt=filled(r),exp=S.expanded.has(r.id);
  const notesTxt=r.notes?r.notes.replace(/^(Inventory|Returns|Receivables|Sales|Waste)\s*/i,'').trim():'';
  return`<div class="rc" style="border-color:${inf.border};margin-bottom:5px">
    <div class="rc-hdr" style="background:${inf.light};padding:6px 10px;gap:6px">
      <div style="flex:1;min-width:80px">
        <div style="font-size:13px;font-weight:700;color:${inf.color}">${r.date}</div>
        ${notesTxt?`<div style="font-size:10px;color:#607D8B;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px">${notesTxt}</div>`:''}
      </div>
      <div style="display:flex;gap:4px;align-items:center">
        <div style="text-align:center;background:#fff;border-radius:7px;padding:3px 8px;min-width:54px">
          <div style="font-size:13px;font-weight:700;color:${inf.color}">${kg}</div>
          <div style="font-size:9px;color:#90A4AE">KG</div>
        </div>
        <div style="text-align:center;background:#fff;border-radius:7px;padding:3px 8px;min-width:40px">
          <div style="font-size:13px;font-weight:700;color:#546E7A">${cnt}</div>
          <div style="font-size:9px;color:#90A4AE">Prods</div>
        </div>
      </div>
      <div style="display:flex;gap:3px">
        <button style="background:${inf.color};color:#fff;border:none;border-radius:7px;width:32px;height:32px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center" onclick="toggleCard('${r.id}')">${exp?'▲':'▼'}</button>
        <button style="background:#607D8B;color:#fff;border:none;border-radius:7px;width:32px;height:32px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center" onclick="editRec('${r.id}')">✏️</button>
        <button style="background:#D32F2F;color:#fff;border:none;border-radius:7px;width:32px;height:32px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center" onclick="delRec('${r.id}')">♻️</button>
      </div>
    </div>
    ${exp?`<div style="padding:8px 10px">
      ${r.cwc?`<div style="margin-bottom:7px;background:#FFF8E1;border-radius:7px;padding:7px;border:1px solid #FFE082">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <div style="font-size:10px;font-weight:700;color:#F57F17">⚖️ Carton Weight Verification</div>
          <button onclick="editCWC('${r.id}')" style="border:none;background:#FF8F00;color:#fff;border-radius:5px;padding:2px 8px;cursor:pointer;font-size:10px">✏️ Edit</button>
        </div>
        ${r.cwc.rows.map((row,i)=>`<div style="display:flex;justify-content:space-between;font-size:10px;padding:2px 0;border-bottom:1px solid #FFF3E0">
          <span style="color:#546E7A">Batch ${i+1}: ${row.sh||'—'} | ${row.ctns} CTN | ${row.gross} KG</span>
          <span style="color:#2E7D32;font-weight:700">${row.net} KG</span>
        </div>`).join('')}
        <div style="display:flex;justify-content:space-between;margin-top:5px;padding-top:4px;border-top:2px solid #FFE082">
          <span style="font-size:11px;font-weight:700;color:#455A64">Net:</span>
          <span style="font-size:12px;font-weight:700;color:#2E7D32">${(r.cwc.totalNet||r.cwc.rows.reduce((s,rw)=>s+rw.net,0)).toFixed(3)} KG</span>
        </div>

function getSizePcs(s){
  if(RC.sizePcs[s]!==undefined)return RC.sizePcs[s];
  return s<=1500?(RC.smallPcs||10):(RC.largePcs||8);
}
function getRCTotals(){
  let chickenKG=0,totalCTN=0,cutsKG=0;
  REC_SIZES.forEach(s=>{
    const c=parseFloat(RC.ctns[s])||0;if(!c)return;
    totalCTN+=c;chickenKG+=c*getSizePcs(s)*(s/1000);
  });
  CUT_PRODUCTS.forEach(c=>{
    const v=parseFloat(RC.cuts[c.key])||0;if(!v)return;
    cutsKG+=c.unit==='pcs'?v*0.5:v;
  });
  return{chickenKG,totalCTN,cutsKG,grand:chickenKG+cutsKG};
}
function updRC(){
  requestAnimationFrame(()=>{
    const t=getRCTotals();
    const m={'rc-ctn':t.totalCTN.toFixed(1),'rc-chkg':t.chickenKG.toFixed(2),'rc-cuts':t.cutsKG.toFixed(2),'rc-grand':t.grand.toFixed(2)};
    Object.entries(m).forEach(([id,v])=>{const el=document.getElementById(id);if(el)el.textContent=v;});
  });
}

function saveReceiptAsRec(){
  const t=getRCTotals();
  if(t.chickenKG===0&&!Object.keys(RC.extraItems||{}).length){alert('No data entered!');return;}
  const items=emptyItems();
  if(t.chickenKG>0)items['Chicken']={kg:t.chickenKG.toFixed(3),pcs:''};
  // Merge extraItems FIRST (before building r)
  if(RC.extraItems){
    Object.entries(RC.extraItems).forEach(([p,v])=>{
      const kg=parseFloat(v.kg)||0;const pcs=parseFloat(v.pcs)||0;
      if(kg>0||pcs>0){
        if(!items[p])items[p]={kg:'',pcs:''};
        if(kg>0)items[p].kg=v.kg;
        if(pcs>0)items[p].pcs=v.pcs;
      }
    });
  }
  // Save non-empty CTN sizes
  const ctns={};Object.entries(RC.ctns).forEach(([s,v])=>{if(parseFloat(v)>0)ctns[s]=parseFloat(v);});
  // Save CWC verification if available
  const cwcData=CWC_ROWS.filter(row=>parseFloat(row.ctns)>0&&parseFloat(row.gross)>0).map(row=>{
    const res=calcCWCRow(row);
    return{sh:row.sh,ctns:parseFloat(row.ctns),gross:parseFloat(row.gross),cwt:parseFloat(row.cwt)||0,net:parseFloat(res.net.toFixed(3))};
  });
  const cwcTotalNet=cwcData.reduce((s,r)=>s+r.net,0);
  const cwcExpected=CWC_EXPECTED||parseFloat(t.grand)||0;
  const cwcDiff=cwcTotalNet-cwcExpected;
  const sizePcs={};REC_SIZES.forEach(s=>{const p=getSizePcs(s);if(p!==10)sizePcs[s]=p;});
  const r={id:gid(),date:RC.date,notes:'Receivables'+(RC.supplier?' — '+RC.supplier:''),
    items:compactItems(items),
    ctns:Object.keys(ctns).length?ctns:undefined,
    sizePcs:Object.keys(sizePcs).length?sizePcs:undefined,
    cwc:cwcData.length?{
      rows:cwcData,
      totalNet:parseFloat(cwcTotalNet.toFixed(3)),
      expected:parseFloat(cwcExpected.toFixed(3)),
      diff:parseFloat(cwcDiff.toFixed(3))
    }:undefined
  };
  if(_editRecId){
    // Update existing record
    const idx=D.receivables.findIndex(x=>x.id===_editRecId);
    if(idx>=0){
      D.receivables[idx]={...D.receivables[idx],...r,id:_editRecId};
    }
    _editRecId=null;
  } else {
    D.receivables=[r,...D.receivables];
  }
  save();
  RC={supplier:'',date:new Date().toISOString().split('T')[0],temp:'',ctns:{},sizePcs:{},largePcs:8,cuts:{},extraItems:{}};
  CWC_ROWS=[{id:1,sh:'',ctns:'',gross:'',cwt:''}];CWC_ID=1;CWC_EXPECTED=0;
  S.view='list';render();showToast(_editRecId?'✅ Record updated!':'✅ Receipt saved as Receivable!');
  _editRecId=null;
}

let NWC_TYPES=[
  {key:'salle',label:'Salle (سله)',wt:1.7},
  {key:'al_khair',label:'Al Khair CTN',wt:0.65},
  {key:'al_ulyaa',label:'Al Ulyaa CTN',wt:0.53},
  {key:'custom',label:'Custom...',wt:0},
];
function loadNWCTypes(){try{const s=localStorage.getItem(SK_NWC);if(s){const d=JSON.parse(s);if(Array.isArray(d)&&d.length)NWC_TYPES=d;}}catch(e){}}
function saveNWCTypes(){
  try{localStorage.setItem(SK_NWC,JSON.stringify(NWC_TYPES));}catch(e){}
  _scheduleSave();

function getNWCWt(row){
  if(row.type==='custom')return parseFloat(row.cwt)||0;
  return NWC_TYPES.find(t=>t.key===row.type)?.wt||0;
}
function calcNWCRow(row){
  const cnt=parseFloat(row.count)||0;
  const gross=parseFloat(row.gross)||0;
  const cw=getNWCWt(row);
  return{net:gross>0?gross-(cnt*cw):0,empty:cnt*cw};
}
function getNWCTotal(){return NWC_ROWS.reduce((s,r)=>s+calcNWCRow(r).net,0);}

function setNWC(id,field,val){
  const row=NWC_ROWS.find(r=>r.id===id);
  if(!row)return;
  row[field]=field==='type'?val:normalizeNum(val);
  // Update net display for this row only (no full re-render)
  const res=calcNWCRow(row);
  const netEl=document.getElementById('nwc-net-'+id);
  const formulaEl=document.getElementById('nwc-formula-'+id);
  if(netEl){
    netEl.textContent=res.net>0?res.net.toFixed(3)+' KG':'—';
    netEl.style.color=res.net>0?'#2E7D32':'#90A4AE';
    netEl.style.background=res.net>0?'#E8F5E9':'#F5F5F5';
  }
  if(formulaEl){
    const wt=getNWCWt(row);
    formulaEl.textContent=res.net>0&&wt>0?`${parseFloat(row.gross||0).toFixed(3)} − (${row.count} × ${wt}) = ${res.net.toFixed(3)} KG`:'';
  }
  // Update total
  const el=document.getElementById('nwc-tot-val');
  if(el)el.value=getNWCTotal().toFixed(3)+' KG';
}

function delNWCRow(id){
  NWC_ROWS=NWC_ROWS.filter(r=>r.id!==id);
  document.getElementById('nwc-row-'+id)?.remove();
  // Renumber batch labels
  NWC_ROWS.forEach((r,i)=>{
    const lbl=document.getElementById('nwc-lbl-'+r.id);
    if(lbl)lbl.textContent='Batch '+(i+1);
  });
  const el=document.getElementById('nwc-tot-val');
  if(el)el.value=getNWCTotal().toFixed(3)+' KG';
}

function addNWCRow(){
  // Save current gross input value before adding
  const last=NWC_ROWS[NWC_ROWS.length-1];
  if(last){
    const grossEl=document.getElementById('nwc-gross-'+last.id);

  }
  NWC_ID++;
  const newRow={id:NWC_ID,count:'',type:last?.type||'salle',gross:'',cwt:last?.cwt||''};
  NWC_ROWS.push(newRow);
  const cont=document.getElementById('nwc-rows');
  if(cont){
    cont.appendChild(buildNWCRowEl(newRow,NWC_ROWS.length-1));

    document.getElementById('nwc-cnt-'+NWC_ID)?.focus();
  }

function copyNWCTotal(){
  const tot=getNWCTotal().toFixed(3);

  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(tot).then(()=>showToast('📋 Copied: '+tot+' KG')).catch(()=>fallbackCopy(tot));
  } else {
    fallbackCopy(tot);
  }
}
function fallbackCopy(txt){
  const inp=document.createElement('input');
  inp.value=txt;inp.style.cssText='position:fixed;top:0;left:0;opacity:0';
  document.body.appendChild(inp);
  inp.focus();inp.select();inp.setSelectionRange(0,99999);
  try{document.execCommand('copy');showToast('📋 Copied: '+txt+' KG');}
  catch(e){showToast('اضغط مطولاً على الرقم ونسخه يدوياً');}
  document.body.removeChild(inp);
}

function getPNWCTotal(prod){
  return(S._prodNWC[prod]||[]).reduce((s,r)=>{
    const wt=getNWCWt(r);
    const gross=parseFloat(r.gross)||0;
    const cnt=parseFloat(r.count)||0;
    return s+(gross>0?gross-cnt*wt:0);
  },0);
}

function setPNWC(prod,id,field,val){
  const rows=S._prodNWC[prod]||[];
  const row=rows.find(r=>r.id===id);

  // Update net for this row only (no re-render = keyboard stays open)
  if(row){
    const wt=getNWCWt(row);
    const gross=parseFloat(row.gross)||0;
    const cnt=parseFloat(row.count)||0;
    const net=gross>0?gross-cnt*wt:0;

      netEl.textContent=net>0?net.toFixed(3):'—';

  if(S.view==='receipt'){

    RC.extraItems[prod].kg=tot.toFixed(3);

function findProductKey(name,is500){
  const n=name.toLowerCase().trim();
  for(const p of PRODUCTS){
    if(p.toLowerCase()===n)return p;
    if(is500&&p.toLowerCase()===n+' 500')return p;
  }
  for(const p of PRODUCTS){
    const base=p.replace(/ 500$/,'').toLowerCase();
    if(n===base||base.startsWith(n)||n.startsWith(base)){
      if(is500&&p.endsWith(' 500'))return p;
      if(!is500&&!p.endsWith(' 500'))return p;
    }
  }
  return null;
}

function parseInventoryText(text){
  const result={};
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  let driverCandidate=null;
  for(const line of lines){
    if(/IAT Trading|WhatsApp/i.test(line))continue;
    const dm=line.match(/(\d{1,2})\s*[\/\-\.]\s*(\d{1,2})\s*[\/\-\.]\s*(\d{2,4})/);
    if(dm){
      let[,d,m,y]=dm;if(y.length===2)y='20'+y;
      result._date=`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
      continue;
    }
    const pm=line.match(/^([a-zA-Z\u0600-\u06FF\s]+?)\s+(\d+(?:\.\d+)?)\s*(pcs?|trays?|treys?|kg|\u0643\u063a|\u0637\u0628\u0642|\u0623\u0637\u0628\u0627\u0642)?$/i);
    if(pm){
      const[,name,qty,unit]=pm;
      const q=parseFloat(qty);
      const u=(unit||'').toLowerCase();
      const is500=/pcs?|trays?|treys?/.test(u);
      const key=findProductKey(name.trim(),is500);
      if(key){result[key]=is500?{pcs:q}:{kg:q};continue;}
    }
    if(!driverCandidate&&/^[a-zA-Z\u0600-\u06FF\s]{2,30}$/.test(line)&&!/return|inventory|waste|receivable/i.test(line)){
      driverCandidate=line.trim();
    }
  }
  if(driverCandidate)result._driver=driverCandidate;
  return result;
}

function extractJSON(text){
  const c=text.replace(/```json|```/g,'').trim();
  try{return JSON.parse(c);}catch(e){}
  const s=c.indexOf('{'),en=c.lastIndexOf('}');
  if(s>=0&&en>s)try{return JSON.parse(c.slice(s,en+1));}catch(ex){}
  throw new Error('Invalid JSON: '+c.substring(0,100));
}

    const prompt='Analyze this Fresh Chicken Receipt Report image. Return ONLY a JSON object with no markdown:\n{"supplier":"name or null","date":"YYYY-MM-DD or null","ctns":{"1300":32,"1350":17},"cuts":{"breast":0,"legs":0,"drum":0,"thigh":0,"thighbl":0,"wings":0,"liver":0,"gizzard":0,"heart":0,"bone":0}}\nNOTE: "tray"/"trey" = 500g pack. cuts values are in KG. Only include sizes/cuts with actual numbers. Omit zero values.';
    let result;
    if(prov==='gemini'){
      const resp=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({contents:[{parts:[{inline_data:{mime_type:file.type,data:b64}},{text:prompt}]}]})
      });
      if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+resp.status);}
      const d=await resp.json();
      result=extractJSON(d.candidates[0].content.parts[0].text);
    } else if(prov==='groq'){
      const resp=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Authorization':'Bearer '+apiKey,'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'meta-llama/llama-4-scout-17b-16e-instruct',
          messages:[{role:'user',content:[
            {type:'image_url',image_url:{url:'data:'+file.type+';base64,'+b64}},
            {type:'text',text:prompt}
          ]}],
          max_tokens:2000
        })
      });
      if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+resp.status);}
      const d=await resp.json();
      result=extractJSON(d.choices[0].message.content);
    } else {
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:2000,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:prompt}]}]})
      });
      if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||'HTTP '+resp.status);}
      const d=await resp.json();
      result=extractJSON(d.content.map(x=>x.text||'').join(''));
    }
    if(result.supplier)RC.supplier=result.supplier;
    if(result.date)RC.date=result.date;
    if(result.ctns)Object.entries(result.ctns).forEach(([k,v])=>{if(v)RC.ctns[k]=String(v);});
    if(result.cuts)Object.entries(result.cuts).forEach(([k,v])=>{if(v&&CUT_PRODUCTS.find(c=>c.key===k))RC.cuts[k]=String(v);});
    render();showToast('✅ Scanned! Please verify.');
  }catch(e){
    if(e.message.includes('401')||e.message.includes('API_KEY')||e.message.includes('auth')){
      alert('❌ API Key غلط!\nتحقق من Settings → 🔑 API Key');
    } else if(e.message.includes('quota')||e.message.includes('429')||e.message.includes('exceeded')){
      alert('⚠️ تجاوزت الحد المجاني\nانتظر دقيقة وحاول ثاني\n\nتأكد إنك أخذت المفتاح من aistudio.google.com وليس cloud console');
    } else {
      alert('Scan error: '+e.message);
    }
  }
}

function calcCWCRow(row){
  let ew=0;
  if(row.sh&&row.sh!=='custom'){const s=SH_DATA.find(x=>x.name===row.sh);ew=s?s.wt:0;}
  else if(row.sh==='custom')ew=parseFloat(row.cwt)||0;
  const n=parseFloat(row.ctns)||0,g=parseFloat(row.gross)||0;
  return{empty:n*ew,net:g>0?g-n*ew:0};
}

function updCWCTotal(){
  let tot=0;CWC_ROWS.forEach(r=>{tot+=calcCWCRow(r).net;});
  const el=document.getElementById('cwc-total');
  if(el)el.innerHTML=`<div style="display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:700">Total Net Weight</span><span style="font-size:17px;font-weight:700;color:#00695C">${tot.toFixed(3)} KG</span></div>`;
  const cmp=parseFloat(document.getElementById('cwc-cmp')?.value)||0;
  const dd=document.getElementById('cwc-diff');
  if(dd&&cmp>0){
    const d=tot-cmp,p=d/cmp*100;dd.style.display='block';
    dd.style.background=Math.abs(d)<0.5?'#E8F5E9':'#FFF3E0';
    dd.innerHTML=`<div style="font-size:11px;color:#546E7A;margin-bottom:3px">Receipt: ${cmp} KG | Net: ${tot.toFixed(3)} KG</div>
      <div style="font-size:16px;font-weight:700;color:${Math.abs(d)<0.5?'#2E7D32':'#E65100'}">${d>=0?'+':''}${d.toFixed(3)} KG (${p>=0?'+':''}${p.toFixed(1)}%)</div>`;
  }else if(dd)dd.style.display='none';
}

function saveCWCAndClose(){
  document.querySelectorAll('#cwc-rows input[type="tel"]').forEach(inp=>{
    if(!inp.id)return;
    const m=inp.id.match(/cwc-(ctn|gross)-(\d+)/);
    if(!m)return;
    const row=CWC_ROWS.find(r=>r.id==m[2]);
    if(row)row[m[1]==='ctn'?'ctns':'gross']=inp.value;
  });
  const cmpEl=document.getElementById('cwc-cmp');
  CWC_EXPECTED=parseFloat(cmpEl?.value)||0;
  document.getElementById('cwc-modal')?.remove();

  // If editing an existing record, save back to it
  if(_cwcTargetRecId){
    const rec=D.receivables.find(r=>r.id===_cwcTargetRecId);
    if(rec){
      const cwcData=CWC_ROWS.filter(row=>parseFloat(row.ctns)>0&&parseFloat(row.gross)>0).map(row=>{
        const res=calcCWCRow(row);
        return{sh:row.sh,ctns:parseFloat(row.ctns),gross:parseFloat(row.gross),cwt:parseFloat(row.cwt)||0,net:parseFloat(res.net.toFixed(3))};
      });
      const tot=cwcData.reduce((s,r)=>s+r.net,0);
      const diff=tot-CWC_EXPECTED;
      rec.cwc={rows:cwcData,totalNet:parseFloat(tot.toFixed(3)),expected:CWC_EXPECTED,diff:parseFloat(diff.toFixed(3))};
      save();render();
      showToast('✅ CWC saved to record!');
    }
    _cwcTargetRecId=null;
    return;
  }

  const tot=CWC_ROWS.reduce((s,r)=>s+calcCWCRow(r).net,0);
  const valid=CWC_ROWS.filter(r=>parseFloat(r.ctns)>0&&parseFloat(r.gross)>0).length;
  if(valid>0){
    const diff=tot-CWC_EXPECTED;
    const ok=CWC_EXPECTED>0&&Math.abs(diff)<0.5;
    showToast('⚖️ '+valid+' batch(es): '+tot.toFixed(3)+' KG'+(CWC_EXPECTED>0?(ok?' ✅':' ⚠️ '+diff.toFixed(3)+' KG'):''));
  }
}

        </div>
        <div class="mini"><div class="mini-v" style="color:${inf.color}">${kg}</div><div class="mini-l">KG</div></div>

}

// ─── Formula Builder ──────────────────────────────
function renderFormula(fid){
  const fa=fid==='a'?FA:FB;
  const fcolor=fid==='a'?'#4527A0':'#00695C';
  const fname=fid==='a'?'Formula A':'Formula B';
  const ff=fid==='a'?S.faFilter:S.fbFilter;
  const totals=fa.length?calcFormula(fa):null;

  // Remove orphaned records
  const cleaned=fa.filter(op=>!!findRecord(op.id));
  if(cleaned.length!==fa.length){if(fid==='a')FA=cleaned;else FB=cleaned;saveFormulas();}

  let h=`<div class="card" style="border:1.5px solid ${fid==='a'?'#B39DDB':'#80CBC4'}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h2 style="margin:0;font-size:16px;color:${fcolor}">🧮 ${fname}</h2>
      ${fa.length?`<div style="display:flex;gap:5px">
        <button class="btn" style="background:#E8EAF6;color:${fcolor};font-size:11px" onclick="S.${fid==='a'?'faShowDetail':'fbShowDetail'}=!S.${fid==='a'?'faShowDetail':'fbShowDetail'};render()">
          ${(fid==='a'?S.faShowDetail:S.fbShowDetail)?'📊 Hide Detail':'📊 Show Detail'}
        </button>
        <button class="btn" style="background:#ECEFF1;color:#C62828;font-size:11px" onclick="${fid==='a'?'FA=[]':'FB=[]'};saveFormulas();render()">Clear All</button>
      </div>`:''}
    </div>
    <!-- Current formula display -->
    ${fa.length?`<div style="margin-bottom:10px">
      <div style="font-size:10px;color:#78909C;margin-bottom:5px">Current Formula (tap chip to cycle: + → − → skip → remove):</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;align-items:center">
        ${fa.map((op)=>{
          const l=getRecordLabel(op.id,true);
          const lbl=typeof l==='object'?l.label:l;
          const chipStyle=op.op==='+'?'chip-plus':op.op==='-'?'chip-minus':'background:#F5F5F5;color:#9E9E9E;border:1px solid #E0E0E0;text-decoration:line-through;';
          const prefix=op.op==='+'?'+ ':op.op==='-'?'− ':'○ ';
          return`<span class="chip ${op.op==='+'||op.op==='-'?chipStyle:''}" style="${op.op==='skip'?chipStyle:''}" title="Click to cycle state" onclick="cycleChip('${fid}','${op.id}','${op.op}')">${prefix}${lbl}</span>`;
        }).join('')}
      </div>
    </div>`:`<div style="color:#B0BEC5;font-size:12px;margin-bottom:10px">No records added yet. Add below ↓</div>`}
    <!-- Date filter -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;margin-bottom:8px;padding:8px;background:#F8F9FA;border-radius:8px">
      <div style="font-size:10px;color:#546E7A;font-weight:600;width:100%">📅 Filter by Date Range:</div>
      <div><div style="font-size:9px;color:#90A4AE;margin-bottom:2px">From</div>
        <input class="fi" type="date" value="${fid==='a'?S.faFrom:S.fbFrom}" style="font-size:11px;padding:4px 7px"
          onchange="S.${fid==='a'?'faFrom':'fbFrom'}=this.value;render()"></div>
      <div><div style="font-size:9px;color:#90A4AE;margin-bottom:2px">To</div>
        <input class="fi" type="date" value="${fid==='a'?S.faTo:S.fbTo}" style="font-size:11px;padding:4px 7px"
          onchange="S.${fid==='a'?'faTo':'fbTo'}=this.value;render()"></div>
      <button class="btn" style="background:#ECEFF1;color:#546E7A;font-size:10px;padding:5px 9px;align-self:flex-end" onclick="quickFormulaFilter('${fid}',3)">Last 3 Days</button>
      <button class="btn" style="background:#ECEFF1;color:#546E7A;font-size:10px;padding:5px 9px;align-self:flex-end" onclick="quickFormulaFilter('${fid}',0)">Today</button>
      ${(fid==='a'?S.faFrom||S.faTo:S.fbFrom||S.fbTo)?`<button class="btn" style="background:#FFEBEE;color:#C62828;font-size:10px;padding:5px 9px;align-self:flex-end" onclick="S.${fid==='a'?'faFrom=S.faTo':'fbFrom=S.fbTo'}='';render()">× Clear</button>`:''}
    </div>
    <!-- Record picker -->
    <div style="font-size:11px;color:#546E7A;margin-bottom:6px;font-weight:600">Add Records:</div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">
      ${[['all','All'],['inventories','📦'],['receivables','📥'],['returns','🔄'],['sales','📤'],['daySales','☀️'],['stockSummaries','📊'],['waste','♻️'],['production','🏭']].map(([k,l])=>
        `<button class="btn" style="background:${ff===k?fcolor:'#ECEFF1'};color:${ff===k?'#fff':'#546E7A'};padding:3px 9px;font-size:11px" onclick="S.${fid==='a'?'faFilter':'fbFilter'}='${k}';render()">${l}</button>`
      ).join('')}
    </div>`;

  // Show records to add (with date filter)
  const all=allRecords();
  const dateFrom=fid==='a'?S.faFrom:S.fbFrom;
  const dateTo=fid==='a'?S.faTo:S.fbTo;
  let filtered=ff==='all'?all:all.filter(r=>r._key===ff);
  if(dateFrom) filtered=filtered.filter(r=>r.date>=dateFrom);
  if(dateTo)   filtered=filtered.filter(r=>r.date<=dateTo);
  if(!filtered.length){h+=`<div style="color:#B0BEC5;font-size:12px;padding:10px 0">No records found${dateFrom||dateTo?' in this date range':''}</div>`;}
  filtered.forEach(r=>{
    const inf=TYPE_INFO[r._type]||{emoji:'📄',color:'#546E7A'};
    const curOp=fa.find(o=>o.id===r.id)?.op||'';
    const bgMap={'+':inf.color+'0A','-':'#FFF5F5','skip':'#F5F5F5'};
    const borderMap={'+':inf.color+'44','-':'#EF9A9A44','skip':'#E0E0E0'};
    h+=`<div style="display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;border:1px solid ${curOp?borderMap[curOp]:'#ECEFF1'};margin-bottom:5px;background:${curOp?bgMap[curOp]:'#fff'}">
      <div style="flex:1;min-width:90px;${curOp==='skip'?'opacity:.5':''}">
        <div style="font-size:12px;font-weight:700;color:${inf.color}">${inf.emoji} ${r.date}</div>
        ${r.notes?`<div style="font-size:10px;color:#78909C">📝 ${r.notes}</div>`:''}
        <div style="font-size:10px;color:#90A4AE">${combinedKg(r).toFixed(2)} KG | ${filled(r)} prods</div>
      </div>
      <div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end">
        <button class="btn" style="background:${curOp==='+'?'#2E7D32':'#E8F5E9'};color:${curOp==='+'?'#fff':'#2E7D32'};padding:4px 9px;font-size:12px;font-weight:700" onclick="addToFormula('${fid}','${r.id}','+')">+</button>
        <button class="btn" style="background:${curOp==='-'?'#C62828':'#FFEBEE'};color:${curOp==='-'?'#fff':'#C62828'};padding:4px 9px;font-size:12px;font-weight:700" onclick="addToFormula('${fid}','${r.id}','-')">−</button>
        <button class="btn" style="background:${curOp==='skip'?'#616161':'#F5F5F5'};color:${curOp==='skip'?'#fff':'#9E9E9E'};padding:4px 9px;font-size:12px;font-weight:700" title="Exclude from formula" onclick="addToFormula('${fid}','${r.id}','skip')">○</button>
        ${curOp?`<button class="btn" style="background:#ECEFF1;color:#C62828;padding:4px 7px;font-size:11px" title="Remove from formula" onclick="addToFormula('${fid}','${r.id}','remove')">×</button>`:''}
      </div>
    </div>`;
  });
  h+=`</div>`;

  // Result
  if(fa.length&&totals){
    h+=`<div class="card" style="border:1.5px solid ${fid==='a'?'#B39DDB':'#80CBC4'}">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px">
        <div style="font-size:13px;font-weight:700;color:${fcolor}">📊 Result: ${fname}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          <span style="font-size:10px;color:#78909C;align-self:center">Export:</span>
          <button class="btn" style="background:#1B5E20;color:#fff;padding:4px 10px;font-size:11px" onclick="exportFormulaXLSX('${fid}')">📊 Excel</button>
          <button class="btn" style="background:#1565C0;color:#fff;padding:4px 10px;font-size:11px" onclick="exportFormulaImage('${fid}')">🖼️ Image</button>
          <button class="btn" style="background:#C62828;color:#fff;padding:4px 10px;font-size:11px" onclick="exportFormulaPDF('${fid}')">📄 PDF</button>
          <button class="btn" style="background:#25D366;color:#fff;padding:4px 10px;font-size:11px" onclick="shareFormulaWhatsApp('${fid}')">💬 WhatsApp</button>
        </div>
      </div>
      ${(fid==='a'?S.faShowDetail:S.fbShowDetail)?`
      <div style="margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;color:${fcolor};margin-bottom:6px">📋 Detailed Breakdown — ${fname}</div>
        ${renderFormulaDetail(fid)}
      </div>
      <hr style="border:none;border-top:1px solid #ECEFF1;margin-bottom:12px">`:''}
      ${renderFT(totals)}
    </div>`;
  }
  return h;
}

// ─── Difference Page ──────────────────────────────
function renderDiff(){
  const totA=FA.length?calcFormula(FA):null;
  const totB=FB.length?calcFormula(FB):null;

  let h=`<div class="card" style="border:1.5px solid #FFAB91">
    <h2 style="margin:0 0 6px;font-size:16px;color:#BF360C">⚖️ Difference: Formula B − Formula A</h2>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
      <span class="badge" style="background:#EDE7F6;color:#4527A0">🧮 Formula A: ${FA.length} records</span>
      <span class="badge" style="background:#E0F2F1;color:#00695C">🧮 Formula B: ${FB.length} records</span>
    </div>`;

  if(!totA&&!totB){
    h+=`<div style="color:#90A4AE;font-size:12px">Please add records to Formula A and Formula B first.</div></div>`;return h;
  }
  if(!totA){h+=`<div style="color:#C62828;font-size:12px">⚠️ Formula A is empty</div></div>`;return h;}
  if(!totB){h+=`<div style="color:#C62828;font-size:12px">⚠️ Formula B is empty</div></div>`;return h;}
  h+=`</div>`;

  // Build diff
  const diff={};PRODUCTS.forEach(p=>diff[p]={kg:(totB[p]?.kg||0)-(totA[p]?.kg||0),pcs:(totB[p]?.pcs||0)-(totA[p]?.pcs||0)});
  const vis=PRODUCTS.filter(p=>diff[p].kg!==0||diff[p].pcs!==0);
  const grandA=PARENT_PRODUCTS.reduce((s,p)=>s+getTotalKg(totA,p),0);
  const grandB=PARENT_PRODUCTS.reduce((s,p)=>s+getTotalKg(totB,p),0);
  const grandD=grandB-grandA;

  h+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px">
      <div style="font-size:13px;font-weight:700;color:#BF360C">⚖️ Difference: B − A</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="btn" style="background:#1B5E20;color:#fff;padding:4px 10px;font-size:11px" onclick="exportFormulaXLSX('diff')">📊 Excel</button>
        <button class="btn" style="background:#1565C0;color:#fff;padding:4px 10px;font-size:11px" onclick="exportFormulaImage('diff')">🖼️ Image</button>
        <button class="btn" style="background:#C62828;color:#fff;padding:4px 10px;font-size:11px" onclick="exportFormulaPDF('diff')">📄 PDF</button>
        <button class="btn" style="background:#25D366;color:#fff;padding:4px 10px;font-size:11px" onclick="shareFormulaWhatsApp('diff')">💬 WhatsApp</button>
      </div>
    </div>
    <div style="display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap">
      <div style="background:#EDE7F6;padding:7px 12px;border-radius:8px;text-align:center">
        <div style="font-size:15px;font-weight:700;color:#4527A0">${grandA.toFixed(2)}</div>
        <div style="font-size:9px;color:#78909C">Formula A</div></div>
      <div style="display:flex;align-items:center;font-size:18px;color:#546E7A">→</div>
      <div style="background:#E0F2F1;padding:7px 12px;border-radius:8px;text-align:center">
        <div style="font-size:15px;font-weight:700;color:#00695C">${grandB.toFixed(2)}</div>
        <div style="font-size:9px;color:#78909C">Formula B</div></div>
      <div style="display:flex;align-items:center;font-size:18px;color:#546E7A">=</div>
      <div style="background:${grandD>0?'#E8F5E9':grandD<0?'#FFEBEE':'#ECEFF1'};padding:7px 12px;border-radius:8px;text-align:center">
        <div style="font-size:15px;font-weight:700;color:${grandD>0?'#2E7D32':grandD<0?'#C62828':'#546E7A'}">${grandD>=0?'+':''}${grandD.toFixed(2)}</div>
        <div style="font-size:9px;color:#78909C">Diff</div></div>
    </div>
    <div style="border-radius:9px;border:1px solid #ECEFF1;overflow:hidden">
    <table style="width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed">
      <colgroup><col style="width:24px"><col><col style="width:70px"><col style="width:70px"><col style="width:75px"><col style="width:75px"></colgroup>
      <thead><tr style="background:#263238;color:#fff">
        <th style="padding:4px 5px;text-align:center">#</th>
        <th style="padding:4px 5px">Product</th>
        <th style="padding:3px 4px;text-align:center;background:#4527A0CC">A<br><small style="font-weight:400;font-size:9px">Qty</small></th>
        <th style="padding:3px 4px;text-align:center;background:#00695CCC">B<br><small style="font-weight:400;font-size:9px">Qty</small></th>
        <th style="padding:3px 4px;text-align:center;background:#BF360C">B−A<br><small style="font-weight:400;font-size:9px">Qty</small></th>
        <th style="padding:3px 4px;text-align:center;background:#1565C0">B−A<br><small style="font-weight:400;font-size:9px">Comb KG</small></th>
      </tr></thead><tbody>`;

  // Show all products (kg and pcs separately)
  const allVis=PRODUCTS.filter(p=>{
    const isPcs=!!C_MAP[p]; // child = pcs product
    const qA=isPcs?(totA[p]?.pcs||0):(totA[p]?.kg||0);
    const qB=isPcs?(totB[p]?.pcs||0):(totB[p]?.kg||0);
    return qA!==0||qB!==0;
  });
  allVis.forEach((p,i)=>{
    const isPcs=!!C_MAP[p];
    const unit=isPcs?'pcs':'kg';
    const qA=isPcs?(totA[p]?.pcs||0):(totA[p]?.kg||0);
    const qB=isPcs?(totB[p]?.pcs||0):(totB[p]?.kg||0);
    const d=qB-qA;
    const dColor=d>0?'#1B5E20':d<0?'#B71C1C':'#9E9E9E';
    const pColor=isPcs?'#7B1FA2':'#1B5E20';
    h+=`<tr style="background:${i%2===0?'#fff':'#FAFAFA'};border-bottom:1px solid #EFEFEF">
      <td style="padding:3px 4px;color:#BDBDBD;font-size:9px;text-align:center">${PRODUCTS.indexOf(p)+1}</td>
      <td style="padding:1px 4px;font-weight:700;color:${pColor};font-size:10px;word-break:break-word">${p}${isPcs?'<div style="font-size:8px;color:#90A4AE">↗ '+C_MAP[p]+'</div>':''}</td>
      <td style="padding:4px 5px;text-align:center;color:${qA!==0?'#4527A0':'#CFD8DC'}">${qA!==0?qA.toFixed(2)+' <small>'+unit+'</small>':'—'}</td>
      <td style="padding:4px 5px;text-align:center;color:${qB!==0?'#00695C':'#CFD8DC'}">${qB!==0?qB.toFixed(2)+' <small>'+unit+'</small>':'—'}</td>
      <td style="padding:4px 5px;text-align:center;font-weight:700;color:${dColor};background:${d>0?'#F1F8E9':d<0?'#FFF5F5':'#F5F5F5'}">${d!==0?(d>0?'+':'')+d.toFixed(2)+' <small>'+unit+'</small>':'—'}</td>
      <td style="padding:4px 5px;text-align:center;font-weight:700;color:${(()=>{const ckA=getTotalKg(totA,p),ckB=getTotalKg(totB,p),cd=ckB-ckA;return cd>0?'#1565C0':cd<0?'#C62828':'#9E9E9E';})()};background:#EEF2FF">${(()=>{const ckA=getTotalKg(totA,p),ckB=getTotalKg(totB,p),cd=ckB-ckA;return cd!==0?(cd>0?'+':'')+cd.toFixed(2)+' kg':'—';})()}</td>
    </tr>`;
  });
  const dTotal=grandD;
  h+=`<tr style="background:#263238;color:#fff;font-weight:700">
    <td colspan="2" style="padding:7px 7px">TOTAL</td>
    <td style="text-align:center;background:#4527A0CC">${grandA.toFixed(2)}</td>
    <td style="text-align:center;background:#00695CCC">${grandB.toFixed(2)}</td>
    <td style="text-align:center;background:#BF360C">${dTotal>=0?'+':''}${dTotal.toFixed(2)}</td>
    <td style="text-align:center;background:#1565C0">${grandD>=0?'+':''}${grandD.toFixed(2)} kg</td>
  </tr></tbody></table></div></div>`;
  return h;
}

function addNWCType(){
  const key='ct_'+Date.now();
  // Insert before 'custom' entry
  const ci=NWC_TYPES.findIndex(t=>t.key==='custom');
  NWC_TYPES.splice(ci,0,{key,label:'New Container',wt:0});
  saveNWCTypes();render();
}
function delNWCType(key){
  if(NWC_TYPES.filter(t=>t.key!=='custom').length<=1){alert('يجب الإبقاء على نوع واحد على الأقل');return;}
  NWC_TYPES=NWC_TYPES.filter(t=>t.key!==key);
  saveNWCTypes();render();
}

function handleStockFile(inp){const f=inp.files[0];if(!f)return;const reader=new FileReader();reader.onload=e=>processStockExcel(e.target.result,f.name);reader.readAsArrayBuffer(f);}
function handleStockDrop(e){e.preventDefault();document.getElementById('uz2')?.classList.remove('drag');const f=e.dataTransfer.files[0];if(!f)return;const reader=new FileReader();reader.onload=ev=>processStockExcel(ev.target.result,f.name);reader.readAsArrayBuffer(f);}

function processStockExcel(buf,name){
  try{
    const wb=XLSX.read(buf,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    const result=[],converted={};PRODUCTS.forEach(p=>converted[p]=0);
    for(let i=0;i<rows.length;i++){
      const row=rows[i];
      const rname=String(row[0]||'').trim();
      // Parse numeric value from column B (strip units like KG, CTN, PCS)
      const rawB=String(row[1]||'').trim();
      const qty=parseFloat(rawB.replace(/[^0-9.\-]/g,''))||0;
      if(!rname||!qty)continue;
      if(rname.toLowerCase().includes('item')||rname.toLowerCase().includes('balance')||rname.toLowerCase().includes('quantity'))continue;
      const map=lookupStockMap(rname);
      const entry={name:rname,qty,matched:!!map,product:map?map.p:'',multiplier:map?map.m:0,converted:map?(qty*map.m):0};
      result.push(entry);
      if(map&&qty)converted[map.p]=(converted[map.p]||0)+(qty*map.m);
    }
    const today=new Date().toISOString().split('T')[0];
    UPS={step:'result',fileName:name,date:today,notes:'Sys.Stock',rows:result,converted,unmatched:result.filter(r=>!r.matched)};
  }catch(e){alert('Error: '+e.message);UPS.step='upload';}
  render();
}

function saveStockRec(){

  save();UPS.step='upload';UPS.rows=[];render();
}

  const toStr=today.toISOString().split('T')[0];
  const from=new Date(today);
  from.setDate(from.getDate()-daysBack);
  S.gFrom=from.toISOString().split('T')[0];
  S.gTo=toStr;
  render();
}
function quickFormulaFilter(fid,daysBack){
  const today=new Date();
  const toStr=today.toISOString().split('T')[0];
  const from=new Date(today);
  from.setDate(from.getDate()-daysBack);
  const fromStr=from.toISOString().split('T')[0];
  if(fid==='a'){S.faFrom=fromStr;S.faTo=toStr;}
  else{S.fbFrom=fromStr;S.fbTo=toStr;}
  render();
}

let _editRecId=null;
function editRec(id){
  const r=D[dk(S.tab)].find(x=>x.id===id);
  if(!r)return;
  S._prodNWC={}; // reset per-product NWC on every edit
  if(S.tab==='receivables'){
    _editRecId=id;
    const sup=r.notes?r.notes.replace(/^Receivables\s*[—\-]\s*/,'').trim():'';
    RC={supplier:sup,date:r.date,temp:r.temp||'',ctns:{...(r.ctns||{})},
        sizePcs:{...(r.sizePcs||{})},smallPcs:RC.smallPcs||10,largePcs:RC.largePcs||8,cuts:{},extraItems:{}};
    // Load all items into extraItems (excluding chicken which comes from CTN)
    const items=expandItems(r.items);
    Object.entries(items).forEach(([p,v])=>{
      if(p==='Chicken')return; // handled by CTN
      const kg=parseFloat(v.kg)||0;const pcs=parseFloat(v.pcs)||0;
      if(kg>0||pcs>0)RC.extraItems[p]={kg:v.kg||'',pcs:v.pcs||''};
    });
    if(r.cwc&&r.cwc.rows){
      CWC_ROWS=r.cwc.rows.map((row,i)=>({id:i+1,sh:row.sh||'',ctns:String(row.ctns),gross:String(row.gross),cwt:''}));
      CWC_ID=CWC_ROWS.length;CWC_EXPECTED=r.cwc.expected||0;
    } else {
      CWC_ROWS=[{id:1,sh:'',ctns:'',gross:'',cwt:''}];CWC_ID=1;CWC_EXPECTED=0;
    }
    S.view='receipt';render();return;
  }
  S.record={...JSON.parse(JSON.stringify(r)),items:expandItems(r.items)};
  S._prodNWC={}; // reset so modal reloads from record._nwc
  S.view='form';render();
}
function delRec(id){if(!confirm('Delete?'))return;D[dk(S.tab)]=D[dk(S.tab)].filter(r=>r.id!==id);save();render();}
function toggleCard(id){S.expanded.has(id)?S.expanded.delete(id):S.expanded.add(id);render();}
function saveRec(){
  const r=S.record;if(!r.date){alert('Please select a date!');return;}
  r.items=compactItems(r.items);
  // If receivables with CWC data, recalculate expected from current items
  if(S.tab==='receivables'&&r.cwc&&r.cwc.rows){
    // Recalculate chicken KG from items
    const expanded=expandItems(r.items);
    let chickenKG=0;
    PRODUCTS.forEach(p=>{
      const item=expanded[p];if(!item)return;
      const kg=parseFloat(item.kg)||0;
      const pcs=parseFloat(item.pcs)||0;
      const combined=kg+(C_MAP[p]?0:pcs*0.5);
      // Only count non-500 products for chicken weight estimate? 
      // Use combined KG like getRCTotals does
      chickenKG+=combined;
    });
    // Use CTN-based weight if available (more accurate)
    if(r.ctns&&Object.keys(r.ctns).length){
      const ctnKG=Object.entries(r.ctns).reduce((s,[sz,n])=>s+parseFloat(n)*parseFloat(sz)/1000,0);
      if(ctnKG>0)chickenKG=ctnKG;
    }
    if(chickenKG>0){
      r.cwc.expected=parseFloat(chickenKG.toFixed(3));
      const tot=r.cwc.rows.reduce((s,rw)=>s+rw.net,0);
      r.cwc.diff=parseFloat((tot-chickenKG).toFixed(3));
    }
  }
  const key=dk(S.tab);const i=D[key].findIndex(x=>x.id===r.id);
  if(i>=0)D[key][i]=r;else D[key]=[r,...D[key]];
  clearDraft();save();S.view='list';S.record=null;S.search='';render();
}

function recalcChickenFromCTN(){
  if(!S.record)return;
  const pcsMap=S.record.sizePcs||{};
  const ctns=S.record.ctns||{};
  let total=0;
  Object.entries(ctns).forEach(([size,count])=>{
    const pcs=parseFloat(pcsMap[size])||10;
    total+=(parseFloat(count)||0)*pcs*(parseInt(size)/1000);
  });
  if(!S.record.items)S.record.items=emptyItems();
  if(!S.record.items.Chicken)S.record.items.Chicken={kg:'',pcs:''};
  S.record.items.Chicken.kg=total>0?total.toFixed(3):'0';

  // Update Chicken input in form
  const ci=document.querySelector('[data-prod="Chicken"][data-field="kg"]');
  if(ci){ci.value=total>0?total.toFixed(3):'0';ci.style.background=total>0?'#FFFDE7':'#fff';}

  // Update stat badges
  const stKg=document.getElementById('stat-kg');
  const stComb=document.getElementById('stat-comb');
  const stCnt=document.getElementById('stat-cnt');
  const stPcs=document.getElementById('stat-pcs');
  const totKg=totalKg(S.record);
  const combKg=PARENT_PRODUCTS.reduce((s,p)=>s+getTotalKg(S.record.items,p),0);
  if(stKg)stKg.textContent=totKg.toFixed(2);
  if(stComb)stComb.textContent=combKg.toFixed(2);
  if(stPcs)stPcs.textContent=PRODUCTS.reduce((a,p)=>a+(parseFloat(S.record.items[p]?.pcs)||0),0);
  if(stCnt)stCnt.textContent=filled(S.record);
}

function updCTNSize(oldSize,newVal,field,countVal){
  if(!S.record.ctns)S.record.ctns={};
  if(field==='size'){
    const count=S.record.ctns[oldSize]||0;
    delete S.record.ctns[oldSize];
    S.record.ctns[newVal]=count;
    recalcChickenFromCTN();
    const el=document.getElementById('ctn-edit-rows');
    if(el)el.innerHTML=renderCTNEditRows();
  } else {
    S.record.ctns[oldSize]=parseFloat(normalizeNum(countVal))||0;
    recalcChickenFromCTN(); // updates Chicken KG + badges only, no re-render
  }
}

function updCTNPcs(size,pcs){
  if(!S.record.sizePcs)S.record.sizePcs={};
  S.record.sizePcs[size]=parseInt(pcs)||10;
  recalcChickenFromCTN();
  const el=document.getElementById('ctn-edit-rows');
  if(el)el.innerHTML=renderCTNEditRows();
}

function delCTNSize(s){

function addCTNSize(){
  if(!S.record.ctns)S.record.ctns={};

  const used=Object.keys(S.record.ctns).map(Number);
  const free=REC_SIZES.find(s=>!used.includes(s))||REC_SIZES[0];
  S.record.ctns[String(free)]=0;

function updItem(p,f,el){
  const v=normalizeNum(el.value);
  if(v!==el.value){
    const pos=el.selectionStart;
    el.value=v;
    try{el.setSelectionRange(pos,pos);}catch(e){}
  }
  // In receipt view, update RC.extraItems instead of S.record
  if(S.view==='receipt'){
    if(!RC.extraItems)RC.extraItems={};
    if(!RC.extraItems[p])RC.extraItems[p]={kg:'',pcs:''};
    RC.extraItems[p][f]=v;
    el.style.borderColor=(parseFloat(v)||0)>0?(f==='pcs'?'#CE93D8':'#81C784'):'#E0E0E0';
    el.style.background=(parseFloat(v)||0)>0?(f==='pcs'?'#F8F0FF':'#F9FBE7'):'#fff';
    return;
  }
  if(!S.record.items[p])S.record.items[p]={kg:'',pcs:''};
  S.record.items[p][f]=v;
  el.style.borderColor=(parseFloat(v)||0)>0?(f==='pcs'?'#CE93D8':'#81C784'):'#E0E0E0';
  el.style.background=(parseFloat(v)||0)>0?(f==='pcs'?'#F8F0FF':'#F9FBE7'):'#fff';
  const sk=document.getElementById('stat-kg'),sc=document.getElementById('stat-cnt'),scomb=document.getElementById('stat-comb'),spcs=document.getElementById('stat-pcs');
  if(sk)sk.textContent=totalKg(S.record).toFixed(2);
  if(scomb)scomb.textContent=PARENT_PRODUCTS.reduce((s,p)=>s+getTotalKg(S.record.items,p),0).toFixed(2);
  if(spcs)spcs.textContent=PRODUCTS.reduce((a,p)=>a+(parseFloat(S.record.items[p]?.pcs)||0),0);
  if(sc)sc.textContent=filled(S.record);
  PRODUCTS.forEach((prod,idx)=>{
    if(C_MAP[prod])return;const cell=document.getElementById(`tk-${idx}`);if(!cell)return;
    const ck=getTotalKg(S.record.items,prod);const fp=ck-(parseFloat(S.record.items[prod]?.kg)||0);
    cell.innerHTML=ck>0?`<div style="font-weight:700;color:#00695C;font-size:11px">${ck.toFixed(2)}</div>${fp>0?`<div style="font-size:9px;color:#2E7D32">+${fp.toFixed(2)}</div>`:''}`:`<span style="color:#CFD8DC">—</span>`;
    cell.style.background=ck>0?'#E0F2F1':'#F5FAFA';
  });
  saveDraft(); // auto-save after every input
}

// ─── Draft Auto-Save ──────────────────────────────
const SK_DRAFT='chk-draft';
function saveDraft(){
  if(!S.record||S.view!=='form')return;
  try{
    localStorage.setItem(SK_DRAFT,JSON.stringify({
      tab:S.tab,record:S.record,prodNWC:S._prodNWC||{},
      ts:Date.now()
    }));
  }catch(e){}
}
function clearDraft(){try{localStorage.removeItem(SK_DRAFT);}catch(e){}}
function checkDraft(){
  try{
    const raw=localStorage.getItem(SK_DRAFT);
    if(!raw)return;
    const d=JSON.parse(raw);
    if(!d.record||!d.tab)return;
    // Only show if draft is less than 24h old
    const age=Date.now()-d.ts;
    if(age>86400000){clearDraft();return;}
    const ageStr=age<60000?'just now':age<3600000?Math.round(age/60000)+'m ago':Math.round(age/3600000)+'h ago';
    const ti2=ti(d.tab);
    if(confirm(`📝 You have an unsaved ${ti2.ar} draft (${ageStr}).\n\nRestore it?`)){
      S.tab=d.tab;
      S.record=d.record;
      S._prodNWC=d.prodNWC||{};
      S.view='form';
      render();
    } else {
      clearDraft();
    }
  }catch(e){clearDraft();}
}

// ─── Production (B−A from Formula, + manual Input/Output, auto Total) ──
function getFormulaBA(fromDate,toDate){
  const filterOps=ops=>{
    if(!fromDate&&!toDate)return ops;
    return ops.filter(op=>{
      const f=findRecord(op.id);if(!f)return false;
      if(fromDate&&f.record.date<fromDate)return false;
      if(toDate&&f.record.date>toDate)return false;
      return true;
    });
  };
  const faOps=filterOps(FA),fbOps=filterOps(FB);
  const totA=faOps.length?calcFormula(faOps):null;
  const totB=fbOps.length?calcFormula(fbOps):null;
  const ba={};
  PRODUCTS.forEach(p=>{
    const isPcs=!!C_MAP[p]; // child = pcs product (500g)
    if(isPcs){
      // pcs products: use pcs directly (not converted to kg)
      const bPcs=totB?(totB[p]?.pcs||0):0;
      const aPcs=totA?(totA[p]?.pcs||0):0;
      ba[p]=bPcs-aPcs;
    } else {
      // kg products: use kg directly
      const bKg=totB?(totB[p]?.kg||0):0;
      const aKg=totA?(totA[p]?.kg||0):0;
      ba[p]=bKg-aKg;
    }
  });
  return ba;
}
function compactProdItems(items){
  const c={};
  Object.entries(items||{}).forEach(([p,v])=>{
    const ba=parseFloat(v.ba)||0,inp=parseFloat(v.input)||0,out=parseFloat(v.output)||0,wst=parseFloat(v.waste)||0;
    if(ba!==0||inp!==0||out!==0||wst!==0)c[p]={ba:ba,input:v.input||'',output:v.output||'',waste:v.waste||''};
  });
  return c;
}
function prodTotal(it){return(parseFloat(it?.ba)||0)+(parseFloat(it?.input)||0)+(parseFloat(it?.waste)||0)-(parseFloat(it?.output)||0);}

function updProdVal(p,field,el){
  const v=normalizeNum(el.value);
  if(v!==el.value){
    const pos=el.selectionStart;el.value=v;
    try{el.setSelectionRange(pos,pos);}catch(e){}
  }
  if(!PRO.items[p])PRO.items[p]={ba:0,input:'',output:'',waste:''};
  PRO.items[p][field]=v;
  const n=parseFloat(v)||0;
  el.style.borderColor=n!==0?'#90CAF9':'#E0E0E0';
  el.style.background=n!==0?'#E3F2FD':'#fff';

  const totEl=document.getElementById('ptot-'+idx);
  if(totEl){
    totEl.textContent=total===0?'—':(total>0?'+':'')+total.toFixed(total%1===0?0:2);
    totEl.style.color=total>0?'#2E7D32':total<0?'#C62828':'#90A4AE';
    totEl.style.background=total>0?'#E8F5E9':total<0?'#FFEBEE':'#F5F5F5';
  }
  updateProductionTotals();
  saveDraft();
}
function updateProductionTotals(){
  let sumBA=0,sumIn=0,sumOut=0,sumWst=0,sumTotal=0,negCount=0,touched=0;
  PRODUCTS.forEach(p=>{
    const it=PRO.items[p];if(!it)return;
    const ba=parseFloat(it.ba)||0,inp=parseFloat(it.input)||0,out=parseFloat(it.output)||0,wst=parseFloat(it.waste)||0;
    const total=ba+inp+wst-out;
    if(ba===0&&inp===0&&out===0&&wst===0)return;
    touched++;sumBA+=ba;sumIn+=inp;sumOut+=out;sumWst+=wst;sumTotal+=total;
    if(total<0)negCount++;
  });
  const set=(id,val)=>{const e=document.getElementById(id);if(e)e.textContent=val;};
  set('p-sum-ba',(sumBA>0?'+':'')+sumBA.toFixed(2));
  set('p-sum-in',sumIn.toFixed(2));
  set('p-sum-out',sumOut.toFixed(2));
  set('p-sum-wst',sumWst.toFixed(2));
  set('p-sum-total',(sumTotal>0?'+':'')+sumTotal.toFixed(2));
  set('p-sum-neg',negCount);
  set('p-sum-cnt',touched);
  const wbtn=document.getElementById('p-waste-btn');
  if(wbtn)wbtn.style.display=sumWst>0?'block':'none';
}

function refreshProductionBA(){

  });

  updateProductionTotals();

function quickProductionBA(daysBack){

function editProductionRec(id){
  const r=D.production.find(x=>x.id===id);if(!r)return;
  PRO={date:r.date,notes:r.notes||'',items:{},baFrom:r.baFrom||'',baTo:r.baTo||''};
  PRODUCTS.forEach(p=>{
    const saved=r.items?.[p];
    PRO.items[p]={ba:saved?(parseFloat(saved.ba)||0):0,input:saved?(saved.input||''):'',output:saved?(saved.output||''):'',waste:saved?(saved.waste||''):''};
  });

}
function cancelProduction(){S.view='list';_editProdId=null;clearDraft();render();}
function saveProductionRec(){
  if(!PRO.date){alert('Please select a date!');return;}
  const compact=compactProdItems(PRO.items);
  if(!Object.keys(compact).length){alert('No data entered!');return;}
  const rec={id:_editProdId||gid(),date:PRO.date,notes:PRO.notes,items:compact,baFrom:PRO.baFrom||'',baTo:PRO.baTo||''};
  if(_editProdId){
    const idx=D.production.findIndex(x=>x.id===_editProdId);
    if(idx>=0)D.production[idx]=rec;
  } else {
    D.production=[rec,...D.production];
  }
  clearDraft();save();_editProdId=null;
  S.view='list';render();
  showToast('✅ Production saved!');
}
function deleteProductionRec(id){
  if(!confirm('Delete this production record?'))return;
  D.production=D.production.filter(x=>x.id!==id);

function sendNegativesToWaste(){
  const wasteVals={};
  PRODUCTS.forEach(p=>{
    const it=PRO.items[p];if(!it)return;
    const w=parseFloat(it.waste)||0;
    if(w>0)wasteVals[p]=w;
  });
  if(!Object.keys(wasteVals).length){alert('No waste quantities entered.');return;}
  if(!confirm('Create a new Waste record with '+Object.keys(wasteVals).length+' product(s)?'))return;
  const items=emptyItems();
  Object.entries(wasteVals).forEach(([p,val])=>{
    const is500=p.endsWith(' 500')||p.endsWith(' FF');
    if(is500){items[p]={kg:'',pcs:(val*2).toFixed(0)};}
    else{items[p]={kg:val.toFixed(3),pcs:''};}
  });
  D.waste=[{id:gid(),date:PRO.date,notes:'From Production'+(PRO.notes?' — '+PRO.notes:''),items:compactItems(items)},...D.waste];
  save();
  showToast('♻️ Waste record created with '+Object.keys(wasteVals).length+' product(s)!');
}

async function captureHTML(html){
  const div=document.createElement('div');
  div.style.cssText='position:fixed;left:-9999px;top:0;z-index:-999;pointer-events:none';
  div.innerHTML=html;document.body.appendChild(div);
  try{
    const canvas=await html2canvas(div.firstChild,{backgroundColor:'#ffffff',scale:2,useCORS:true,logging:false});
    document.body.removeChild(div);return canvas;
  }catch(e){document.body.removeChild(div);throw e;}
}

// ─── Export formula/diff ────────────────────────────
async function exportFormulaImage(fid){
  const btn=event.target;btn.textContent='⏳';btn.disabled=true;
  try{
    const html=fid==='diff'?buildDiffExportHTML():buildFormulaExportHTML(fid);
    if(!html){alert('No data to export');btn.textContent='🖼️';btn.disabled=false;return;}
    const canvas=await captureHTML(html);
    const a=document.createElement('a');a.href=canvas.toDataURL('image/png');
    a.download=`formula-${fid==='diff'?'diff':fid}-${new Date().toISOString().split('T')[0]}.png`;a.click();
  }catch(e){alert('Error: '+e.message);}
  btn.textContent='🖼️';btn.disabled=false;
}
async function exportFormulaPDF(fid){
  const btn=event.target;btn.textContent='⏳';btn.disabled=true;
  try{
    const html=fid==='diff'?buildDiffExportHTML():buildFormulaExportHTML(fid);
    if(!html){alert('No data to export');btn.textContent='📄';btn.disabled=false;return;}
    const canvas=await captureHTML(html);
    const{jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');
    const pw=pdf.internal.pageSize.getWidth()-20;
    const iw=canvas.width/2;const ih=canvas.height/2;
    const ratio=Math.min(pw/iw*3.7795,280/ih*3.7795);
    pdf.addImage(canvas.toDataURL('image/png'),'PNG',10,10,(iw/3.7795)*ratio,(ih/3.7795)*ratio);
    pdf.save(`formula-${fid==='diff'?'diff':fid}-${new Date().toISOString().split('T')[0]}.pdf`);
  }catch(e){alert('Error: '+e.message);}
  btn.textContent='📄';btn.disabled=false;
}
async function shareFormulaWhatsApp(fid){
  const btn=event.target;btn.textContent='⏳';btn.disabled=true;
  try{
    const html=fid==='diff'?buildDiffExportHTML():buildFormulaExportHTML(fid);
    if(!html){alert('No data to export');btn.textContent='💬';btn.disabled=false;return;}
    const canvas=await captureHTML(html);
    const fname=`formula-${fid==='diff'?'diff':fid}-${new Date().toISOString().split('T')[0]}.png`;
    canvas.toBlob(async(blob)=>{
      const file=new File([blob],fname,{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'Inventory',text:fid==='diff'?'Difference Result':'Formula Result'});
      } else {
        const url=URL.createObjectURL(blob);const a=document.createElement('a');
        a.href=url;a.download=fname;a.click();URL.revokeObjectURL(url);
        setTimeout(()=>window.open('https://web.whatsapp.com/','_blank'),500);
      }
      btn.textContent='💬';btn.disabled=false;
    },'image/png');
  }catch(e){alert('Error: '+e.message);btn.textContent='💬';btn.disabled=false;}
}

// ─── Production Report Export (Input/Output/Waste only) ──
function buildProductionReportHTML(id){
  const r=D.production.find(x=>x.id===id);
  if(!r)return null;
  const rows=Object.entries(r.items||{}).filter(([p,v])=>(parseFloat(v.input)||0)!==0||(parseFloat(v.output)||0)!==0||(parseFloat(v.waste)||0)!==0);
  if(!rows.length)return null;
  let sumIn=0,sumOut=0,sumWst=0;
  const tableRows=rows.map(([p,v],i)=>{
    const inp=parseFloat(v.input)||0,out=parseFloat(v.output)||0,wst=parseFloat(v.waste)||0;
    sumIn+=inp;sumOut+=out;sumWst+=wst;
    return`<tr style="background:${i%2===0?'#fff':'#F8F8F8'}">
      <td style="padding:6px 8px;font-size:12px;font-weight:600;color:#263238">${p}</td>
      <td style="padding:6px 8px;text-align:center;font-size:12px;color:#1565C0">${inp?inp.toFixed(inp%1===0?0:2):'—'}</td>
      <td style="padding:6px 8px;text-align:center;font-size:12px;color:#1565C0">${out?out.toFixed(out%1===0?0:2):'—'}</td>
      <td style="padding:6px 8px;text-align:center;font-size:12px;color:#E65100;background:#FFF8F0">${wst?wst.toFixed(wst%1===0?0:2):'—'}</td>
    </tr>`;
  }).join('');
