async function exportProductionImage(id){
  const btn=event.target;btn.textContent='⏳';btn.disabled=true;
  try{
    const html=buildProductionReportHTML(id);
    if(!html){alert('No Input/Output/Waste data to export');btn.textContent='🖼️';btn.disabled=false;return;}
    const canvas=await captureHTML(html);
    const a=document.createElement('a');a.href=canvas.toDataURL('image/png');
    a.download=`production-report-${new Date().toISOString().split('T')[0]}.png`;a.click();
  }catch(e){alert('Error: '+e.message);}
  btn.textContent='🖼️';btn.disabled=false;
}
async function exportProductionPDF(id){
  const btn=event.target;btn.textContent='⏳';btn.disabled=true;
  try{
    const html=buildProductionReportHTML(id);
    if(!html){alert('No Input/Output/Waste data to export');btn.textContent='📄';btn.disabled=false;return;}
    const canvas=await captureHTML(html);
    const{jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');
    const pw=pdf.internal.pageSize.getWidth()-20;
    const iw=canvas.width/2;const ih=canvas.height/2;
    const ratio=Math.min(pw/iw*3.7795,280/ih*3.7795);
    pdf.addImage(canvas.toDataURL('image/png'),'PNG',10,10,(iw/3.7795)*ratio,(ih/3.7795)*ratio);
    pdf.save(`production-report-${new Date().toISOString().split('T')[0]}.pdf`);
  }catch(e){alert('Error: '+e.message);}
  btn.textContent='📄';btn.disabled=false;
}
async function shareProductionWhatsApp(id){
  const btn=event.target;btn.textContent='⏳';btn.disabled=true;
  try{
    const html=buildProductionReportHTML(id);
    if(!html){alert('No Input/Output/Waste data to export');btn.textContent='💬';btn.disabled=false;return;}
    const canvas=await captureHTML(html);
    const fname=`production-report-${new Date().toISOString().split('T')[0]}.png`;
    canvas.toBlob(async(blob)=>{
      const file=new File([blob],fname,{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'Production Report',text:'Production: Input/Output/Waste'});
      } else {
        const url=URL.createObjectURL(blob);const a=document.createElement('a');
        a.href=url;a.download=fname;a.click();URL.revokeObjectURL(url);
        setTimeout(()=>window.open('https://web.whatsapp.com/','_blank'),500);
      }
      btn.textContent='💬';btn.disabled=false;
    },'image/png');
  }catch(e){alert('Error: '+e.message);btn.textContent='💬';btn.disabled=false;}
}
function exportProductionXLSX(id){
  const r=D.production.find(x=>x.id===id);if(!r)return;
  const rows=[['Chicken Inventory System — Production Report'],[`Date: ${r.date}`+(r.notes?` | Notes: ${r.notes}`:'')],[''],
    ['Product','Input','Output','Waste']];
  let sumIn=0,sumOut=0,sumWst=0;
  Object.entries(r.items||{}).forEach(([p,v])=>{
    const inp=parseFloat(v.input)||0,out=parseFloat(v.output)||0,wst=parseFloat(v.waste)||0;
    if(inp||out||wst){rows.push([p,inp||'',out||'',wst||'']);sumIn+=inp;sumOut+=out;sumWst+=wst;}
  });
  if(rows.length<=4){alert('No Input/Output/Waste data to export');return;}
  rows.push(['TOTAL',+sumIn.toFixed(2),+sumOut.toFixed(2),+sumWst.toFixed(2)]);
  const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:30},{wch:12},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws,'Production');
  XLSX.writeFile(wb,`production-report-${r.date}.xlsx`);
}

function exportFormulaXLSX(fid){
  const isDiff=fid==='diff';
  let rows,title,fname;
  if(isDiff){
    if(!FA.length||!FB.length){alert('Please add records to both Formula A and B');return;}
    const totA=calcFormula(FA),totB=calcFormula(FB);
    const grandA=PARENT_PRODUCTS.reduce((s,p)=>s+getTotalKg(totA,p),0);
    const grandB=PARENT_PRODUCTS.reduce((s,p)=>s+getTotalKg(totB,p),0);
    rows=[['Chicken Inventory System — Difference (B−A)'],[''],
      ['Product','Formula A (KG)','Formula B (KG)','Difference (B−A)']];
    PARENT_PRODUCTS.forEach(p=>{
      const a=getTotalKg(totA,p),b=getTotalKg(totB,p),d=b-a;
      if(a!==0||b!==0)rows.push([p,+a.toFixed(3),+b.toFixed(3),+d.toFixed(3)]);
    });
    rows.push(['TOTAL',+grandA.toFixed(2),+grandB.toFixed(2),+(grandB-grandA).toFixed(2)]);
    title='Difference';fname='formula-diff';
  } else {
    const fa=fid==='a'?FA:FB;
    if(!fa.length){alert('Formula is empty');return;}
    const totals=calcFormula(fa);
    rows=[['Chicken Inventory System — Formula '+(fid==='a'?'A':'B')],[''],
      ['#','Product','Qty','Unit','Combined KG']];
    PRODUCTS.forEach(p=>{
      const is500=!!C_MAP[p];const val=getVal(totals,p);
      if(val!==0){const ck=getTotalKg(totals,p);rows.push([PRODUCTS.indexOf(p)+1,p,+val.toFixed(is500?0:3),is500?'pcs':'kg',!is500?+ck.toFixed(3):''  ]);}
    });
    rows.push(['','TOTAL COMBINED KG','','',+PARENT_PRODUCTS.reduce((s,p)=>s+getTotalKg(totals,p),0).toFixed(2)]);
    title='Formula '+(fid==='a'?'A':'B');fname='formula-'+fid;
  }
  const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:5},{wch:32},{wch:14},{wch:10},{wch:15}];
  XLSX.utils.book_append_sheet(wb,ws,title);
  XLSX.writeFile(wb,`${fname}-${new Date().toISOString().split('T')[0]}.xlsx`);
}

// ═══ STORAGE OPTIMIZATION ════════════════════════════
// Only save non-empty items — reduces size by ~85%
function compactItems(items){
  const c={};
  Object.entries(items||{}).forEach(([k,v])=>{
    if((parseFloat(v.kg)||0)>0||(parseFloat(v.pcs)||0)>0)c[k]=v;
  });
  return c;
}
function expandItems(compact){
  const e=emptyItems();
  Object.entries(compact||{}).forEach(([k,v])=>{if(e[k]!==undefined)e[k]=v;});
  return e;
}
function migrateCompact(){
  // Migrate existing data to compact format on first run
  let changed=false;
  ['inventories','receivables','returns','sales'].forEach(key=>{
    D[key]=D[key].map(r=>{
      const c=compactItems(r.items);
      if(Object.keys(c).length<Object.keys(r.items||{}).length){changed=true;return{...r,items:c};}
      return r;
    });
  });

// ═══ ONEDRIVE — PKCE OAuth (SPA-compatible, no library) ══
const OD_CLIENT_ID='86182a86-981c-46ab-a5e9-c61d8410c64b';
const OD_REDIRECT='https://derghamz88-blip.github.io/IAT-Inventory-/chicken-inventory.html';

function odRandStr(n){
  const c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  const a=new Uint8Array(n);crypto.getRandomValues(a);
  return Array.from(a,x=>c[x%c.length]).join('');
}
async function odChallenge(v){
  const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
function odGetToken(){
  const t=localStorage.getItem('od-at');
  const e=parseInt(localStorage.getItem('od-ate')||'0');
  return t&&Date.now()<e-60000?t:null;
}

async function odLogin(action){
  const v=odRandStr(64),s=odRandStr(16);
  const ch=await odChallenge(v);
  localStorage.setItem('od-v',v);localStorage.setItem('od-s',s);localStorage.setItem('od-p',action);
  const p=new URLSearchParams({
    client_id:OD_CLIENT_ID,response_type:'code',redirect_uri:OD_REDIRECT,
    scope:'Files.ReadWrite User.Read offline_access',
    state:s,code_challenge:ch,code_challenge_method:'S256',
    response_mode:'fragment' // SPA apps return code in hash (#code=...)
  });
  window.location.href='https://login.microsoftonline.com/consumers/oauth2/v2.0/authorize?'+p;
}

async function checkODCallback(){
  // SPA apps return code in fragment (#code=XXX)
  const hash=window.location.hash;
  const hs=new URLSearchParams(hash.startsWith('#')?hash.slice(1):hash);
  // Also check query string as fallback
  const qs=new URLSearchParams(window.location.search);
  const code=hs.get('code')||qs.get('code');
  const state=hs.get('state')||qs.get('state');
  const error=hs.get('error')||qs.get('error');

  if(error){
    window.history.replaceState({},'',window.location.pathname+'#');
    alert('❌ Microsoft error:\n'+(hs.get('error_description')||qs.get('error_description')||error));
    return;
  }
  if(!code)return;

  // Clear URL
  window.history.replaceState({},'',window.location.pathname);
  // State check skipped - multiple login attempts can cause mismatch

  showToast('🔐 Getting access token...');
  try{
    const r=await fetch('https://login.microsoftonline.com/consumers/oauth2/v2.0/token',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({
        client_id:OD_CLIENT_ID,grant_type:'authorization_code',
        code,redirect_uri:OD_REDIRECT,
        code_verifier:localStorage.getItem('od-v')||''
      }).toString()
    });
    const t=await r.json();
    if(!r.ok){
      alert('❌ Token error:\n'+(t.error_description||t.error||JSON.stringify(t)));
      return;
    }
    localStorage.setItem('od-at',t.access_token);
    localStorage.setItem('od-ate',String(Date.now()+(t.expires_in||3600)*1000));
    if(t.refresh_token)localStorage.setItem('od-rt',t.refresh_token);
    localStorage.removeItem('od-v');localStorage.removeItem('od-s');
    const action=localStorage.getItem('od-p')||'';localStorage.removeItem('od-p');
    showToast('✅ Connected to OneDrive!');
    if(action==='save')setTimeout(()=>odSaveExec(t.access_token),500);
    else if(action==='load')setTimeout(()=>odLoadExec(t.access_token),500);
    else alert('✅ Logged in! Now press ☁️ to save.');
  }catch(e){
    alert('❌ Network error:\n'+e.message);
  }
}

  showToast('☁️ Saving to OneDrive...');

    const resp=await fetch('https://graph.microsoft.com/v1.0/me/drive/root:/IAT-Inventory/IAT-Inventory-Backup.json:/content',{

async function odLoadExec(token){
  showToast('📂 Loading from OneDrive...');
  try{
    const lr=await fetch('https://graph.microsoft.com/v1.0/me/drive/root:/IAT-Inventory:/children',{headers:{'Authorization':'Bearer '+token}});
    if(lr.status===401){localStorage.removeItem('od-at');odLogin('load');return;}
    if(!lr.ok){alert('No backup folder found. Save first!');return;}
    const list=await lr.json();
    const files=(list.value||[]).filter(f=>f.name.endsWith('.json')).sort((a,b)=>new Date(b.lastModifiedDateTime)-new Date(a.lastModifiedDateTime));
    if(!files.length){alert('No backup files in OneDrive/IAT-Inventory/');return;}
    const fr=await fetch('https://graph.microsoft.com/v1.0/me/drive/items/'+files[0].id+'/content',{headers:{'Authorization':'Bearer '+token}});
    const data=await fr.json();
    if(!data.version||!data.D){alert('Invalid file');return;}
    if(!confirm('Restore from OneDrive?\nReplaces all current data.'))return;
    applyBackup(data);showToast('✅ Restored from OneDrive!');
  }catch(e){alert('Load error: '+e.message);}
}

function applyBackup(data){
  if(data.PRODUCTS){PRODUCTS=data.PRODUCTS;saveProducts();}

  if(data.SMD){SMD=data.SMD;saveStockMapping();}

  if(data.D){D={inventories:[],receivables:[],returns:[],sales:[],daySales:[],stockSummaries:[],waste:[],production:[],...data.D};save();}
  FA=data.FA||[];FB=data.FB||[];
  saveFormulas();recompute();render();
}

// Stores the file handle in IndexedDB so path is remembered

function openHandleDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('chk-fsh-v1',1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore('h');
    req.onsuccess=e=>res(e.target.result);
    req.onerror=()=>rej(req.error);
  });
}
async function storeHandle(h){
  const db=await openHandleDB();
  return new Promise(res=>{const tx=db.transaction('h','readwrite');tx.objectStore('h').put(h,'bk');tx.oncomplete=res;});
}
async function getHandle(){
  const db=await openHandleDB();
  return new Promise(res=>{const tx=db.transaction('h');const r=tx.objectStore('h').get('bk');r.onsuccess=()=>res(r.result);r.onerror=()=>res(null);});
}
async function clearHandle(){
  const db=await openHandleDB();
  return new Promise(res=>{const tx=db.transaction('h','readwrite');tx.objectStore('h').delete('bk');tx.oncomplete=res;});
}
async function verifyHandle(h,mode){
  try{
    const p=await h.queryPermission({mode});
    if(p==='granted')return true;
    const r=await h.requestPermission({mode});
    return r==='granted';
  }catch{return false;}
}

async function odSave(forceNew=false){
  const data={version:3,exportDate:new Date().toISOString(),PRODUCTS,MD,SMD,SH_DATA,D,FA,FB};
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const fname='IAT-Inventory-Backup.json';
  const file=new File([blob],fname,{type:'application/json'});

  // ── Mobile: use native share sheet (includes OneDrive app) ──
  if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
    try{
      await navigator.share({files:[file],title:'IAT Inventory Backup'});
      showToast('📤 Share sheet opened — choose OneDrive!');
    }catch(e){if(e.name!=='AbortError')alert('Error: '+e.message);}
    return;
  }

  // ── Desktop: File System Access API with remembered handle ──
  if(window.showSaveFilePicker){
    const btn=document.getElementById('od-save-btn');
    if(btn){btn.textContent='⏳';btn.disabled=true;}
    try{
      let h=forceNew?null:await getHandle();
      if(h){const ok=await verifyHandle(h,'readwrite');if(!ok)h=null;}
      if(!h){
        h=await window.showSaveFilePicker({
          suggestedName:fname,
          types:[{description:'Inventory Backup',accept:{'application/json':['.json']}}],
        });
        await storeHandle(h);
      }
      const w=await h.createWritable();
      await w.write(json);await w.close();
      showToast('✅ Saved: '+h.name);
    }catch(e){if(e.name!=='AbortError')alert('Save error: '+e.message);}
    if(btn){btn.textContent='☁️';btn.disabled=false;}
    return;
  }

  // ── Fallback: download ──
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=fname;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('💾 Downloaded — save to OneDrive manually');
}

async function odLoad(forceNew=false){
  // ── Desktop: File System Access API ──
  if(window.showOpenFilePicker){
    const btn=document.getElementById('od-load-btn');
    if(btn){btn.textContent='⏳';btn.disabled=true;}
    try{
      let h=forceNew?null:await getHandle();
      if(h){const ok=await verifyHandle(h,'read');if(!ok)h=null;}
      if(!h){
        const[picked]=await window.showOpenFilePicker({
          types:[{description:'Inventory Backup',accept:{'application/json':['.json']}}],
        });
        h=picked;await storeHandle(h);
      }
      const file=await h.getFile();
      const data=JSON.parse(await file.text());
      if(!data.version||!data.D){alert('Invalid file');return;}
      if(!confirm('Restore from: '+h.name+'?\nReplaces all current data.'))return;
      applyBackup(data);
      showToast('✅ Restored from '+h.name);
    }catch(e){if(e.name!=='AbortError')alert('Load error: '+e.message);}
    if(btn){btn.textContent='📂';btn.disabled=false;}
    return;
  }

  // ── Mobile/Fallback: file input ──
  document.getElementById('fallback-import')?.click();
}

function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#263238;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;box-shadow:0 4px 14px rgba(0,0,0,.3);white-space:nowrap';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}


function importData(input){
  const f=input.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version||!data.D){alert('Invalid file format');return;}
      if(!confirm('This will REPLACE all current data. Continue?'))return;
      if(data.PRODUCTS){PRODUCTS=data.PRODUCTS;saveProducts();}
      if(data.MD){MD=data.MD;saveMapping();}
      if(data.D){D={inventories:[],receivables:[],returns:[],sales:[],daySales:[],stockSummaries:[],waste:[],production:[],...data.D};save();}
      FA=data.FA||[];FB=data.FB||[];
      if(data.SMD){SMD=data.SMD;saveStockMapping();}
      saveFormulas();recompute();
      render();alert('Data restored successfully!');
    }catch(ex){alert('Error: '+ex.message);}
    input.value='';
  };
  reader.readAsText(f);
}

// ── Login screen ────────────────────────────────────
function _showLogin(){
  if(document.getElementById('fb-login-screen'))return;
  document.querySelector('.fb-view-badge')?.remove();
  const logoEl=document.querySelector('#app img, header img');
  const logoSrc=logoEl?logoEl.src:'';
  const d=document.createElement('div');
  d.id='fb-login-screen';
  d.innerHTML=`<div class="fb-box">
    ${logoSrc?`<img class="fb-logo" src="${logoSrc}">`:'<div style="font-size:48px;margin-bottom:8px">🐔</div>'}
    <div class="fb-title">IAT Inventory</div>
    <div class="fb-sub">I A T Trading — Stock Management</div>
    <input class="fb-inp" id="fbe" type="email" placeholder="Email" autocomplete="email" enterkeyhint="next">
    <input class="fb-inp" id="fbp" type="password" placeholder="Password" autocomplete="current-password" enterkeyhint="done">
    <button class="fb-btn" onclick="_doLogin()">🔐 Sign In</button>
    <div class="fb-err" id="fb-err"></div>
  </div>`;
  document.body.appendChild(d);
  setTimeout(()=>document.getElementById('fbe')?.focus(),150);
  document.getElementById('fbe').onkeydown=e=>{if(e.key==='Enter')document.getElementById('fbp')?.focus();};
  document.getElementById('fbp').onkeydown=e=>{if(e.key==='Enter')_doLogin();};
}
window._showLogin=_showLogin;

async function _doLogin(){
  const e=document.getElementById('fbe')?.value?.trim();
  const p=document.getElementById('fbp')?.value;
  const err=document.getElementById('fb-err');
  if(!e||!p){err.textContent='Please enter email and password';return;}
  err.textContent='Signing in...';
  try{
    await window.$signIn(e,p);
  }catch(ex){
    const c=ex.code;
    err.textContent=c==='auth/invalid-credential'||c==='auth/wrong-password'||c==='auth/user-not-found'
      ?'❌ Invalid email or password'
      :c==='auth/too-many-requests'?'⚠️ Too many attempts. Try later.'
      :'Error: '+ex.message;
  }
}
window._doLogin=_doLogin;

// ── Boot after login ────────────────────────────────
async function _fbBoot(){
  showToast('☁️ Loading...');
  try{
    let adminId;
    if(window.$isAdmin){
      adminId=window.$user.uid;
      window.ADMIN_UID=adminId;
    } else {
      // View user: use hardcoded admin UID
      adminId=window.ADMIN_UID;
      if(!adminId){showToast('⚠️ Admin UID not configured');render();return;}
    }
    window.$adminId=adminId;
    await _loadAdminData(adminId);
    if(window.$isView){
      document.querySelector('.fb-view-badge')?.remove();
      const b=document.createElement('div');
      b.className='fb-view-badge';
      b.textContent='👁 VIEW ONLY — Changes are not saved';
      document.body.prepend(b);
    }
    showToast(window.$isAdmin?'✅ Admin: '+window.$user.email:'👁 View only');
  }catch(ex){
    console.error('Boot error:',ex);
    showToast('⚠️ Error: '+ex.message);
  }
  render();
  setTimeout(checkDraft,400);
}
window._fbBoot=_fbBoot;

async function _loadAdminData(adminId){
  const db=window.$db;
  const mainSnap=await window.$getDoc(window.$doc(db,'users',adminId,'data','main'));
  if(mainSnap.exists()){
    // Firebase has data - load it
    const d=mainSnap.data();
    if(d.D)D={inventories:[],receivables:[],returns:[],sales:[],daySales:[],stockSummaries:[],waste:[],production:[],...d.D};
    if(d.FA)FA=d.FA;if(d.FB)FB=d.FB;
    if(d.PRODUCTS&&d.PRODUCTS.length)PRODUCTS=d.PRODUCTS;
    if(d.MD)MD=d.MD;if(d.SMD)SMD=d.SMD;
    recompute();
  } else if(window.$isAdmin){
    // Firebase empty - upload local data to Firebase now
    showToast('☁️ Uploading local data to Firebase...');
    await _fbSaveNow();
    showToast('✅ Local data uploaded to Firebase!');
  }
  const settSnap=await window.$getDoc(window.$doc(db,'users',adminId,'data','settings'));
  if(settSnap.exists()){
    const s=settSnap.data();
    if(s.NWC_TYPES&&s.NWC_TYPES.length)NWC_TYPES=s.NWC_TYPES;
    if(s.RP_DATA)RP_DATA=s.RP_DATA;
    if(s.SH_DATA)SH_DATA=s.SH_DATA;
  } else if(window.$isAdmin){
    // Upload settings too
    await window.$setDoc(window.$doc(db,'users',adminId,'data','settings'),{
      NWC_TYPES,RP_DATA,SH_DATA,updatedAt:Date.now()
    });
  }
}
window._loadAdminData=_loadAdminData;

// ── Firebase save (admin only) ──────────────────────
let _saveTimer=null;
function _scheduleSave(){
  if(!window.$isAdmin)return; // View-only: never save
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(_fbSaveNow,1500);
}
async function _fbSaveNow(){
  if(!window.$isAdmin||!window.$user)return;
  const uid=window.$user.uid;
  try{
    await window.$setDoc(window.$doc(window.$db,'users',uid,'data','main'),{
      D:JSON.parse(JSON.stringify(D)),FA,FB,PRODUCTS,MD,SMD,updatedAt:Date.now()
    });
    await window.$setDoc(window.$doc(window.$db,'users',uid,'data','settings'),{
      NWC_TYPES,RP_DATA,SH_DATA,updatedAt:Date.now()
    });
  }catch(e){console.error('Save error:',e);}
}
window._fbSaveNow=_fbSaveNow;

// ── Sign out ────────────────────────────────────────
async function _fbSignOut(){
  if(!confirm('Sign out?'))return;
  await window.$signOut();
  location.reload();
}
window._fbSignOut=_fbSignOut;

// ── User Management (Admin only) ────────────────────
async function showUserMgmt(){
  document.getElementById('user-mgmt-modal')?.remove();
  if(!window.$isAdmin){showToast('⚠️ Admin only');return;}
  // Get existing view users from Firestore
  let users=[];
  try{
    const snap=await window.$getDocs(window.$col(window.$db,'config','admin','viewUsers'?window.$col(window.$db,'viewUsers'):(()=>{throw 0})()));
  }catch(e){}
  try{
    const snap=await window.$getDocs(window.$col(window.$db,'viewUsers'));
    snap.forEach(d=>users.push({id:d.id,...d.data()}));
  }catch(e){}

  const m=document.createElement('div');
  m.id='user-mgmt-modal';
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  m.innerHTML=`<div style="background:#fff;border-radius:14px;padding:18px;width:100%;max-width:380px;max-height:85vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:15px;font-weight:800;color:#1B3A4B">👥 User Management</div>
      <button onclick="document.getElementById('user-mgmt-modal').remove()" style="border:none;background:none;font-size:22px;cursor:pointer">×</button>
    </div>
    <div style="background:#E8F5E9;border-radius:9px;padding:10px 12px;margin-bottom:14px;font-size:12px">
      <div style="font-weight:700;color:#2E7D32">👑 Admin Account</div>
      <div style="color:#1B5E20">${window.$user?.email}</div>
    </div>
    <div style="font-size:12px;font-weight:700;color:#546E7A;margin-bottom:8px">ADD VIEW-ONLY USER</div>
    <input id="new-user-email" class="fi" type="email" placeholder="Email" style="width:100%;margin-bottom:8px" enterkeyhint="next">
    <input id="new-user-pass" class="fi" type="text" placeholder="Password (min 6 chars)" style="width:100%;margin-bottom:10px" enterkeyhint="done">
    <button onclick="_addViewUser()" style="width:100%;padding:10px;background:#1B3A4B;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:16px">+ Add View User</button>
    <div id="user-list-area">
      ${users.length===0?'<div style="text-align:center;color:#90A4AE;font-size:12px;padding:10px">No view users yet</div>':
        users.map(u=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#F5F5F5;border-radius:8px;margin-bottom:6px">
          <div>
            <div style="font-size:12px;font-weight:600">${u.email}</div>
            <div style="font-size:10px;color:#90A4AE">👁 View Only</div>
          </div>
          <button onclick="_delViewUser('${u.id}','${u.email}')" style="border:none;background:#FFEBEE;color:#C62828;border-radius:6px;padding:5px 9px;font-size:12px;cursor:pointer">🗑</button>
        </div>`).join('')}
    </div>
    <div id="user-mgmt-msg" style="text-align:center;font-size:12px;color:#2E7D32;margin-top:8px"></div>
  </div>`;
  document.body.appendChild(m);
}
window.showUserMgmt=showUserMgmt;

async function _addViewUser(){
  const email=document.getElementById('new-user-email')?.value?.trim();
  const pass=document.getElementById('new-user-pass')?.value?.trim();
  const msg=document.getElementById('user-mgmt-msg');
  if(!email||!pass){if(msg)msg.textContent='Please enter email and password';return;}
  if(pass.length<6){if(msg)msg.textContent='Password must be at least 6 characters';return;}
  if(msg)msg.textContent='Creating user...';
  try{
    // Create auth user
    const cred=await window.$createUser(email,pass);
    // Store in viewUsers collection
    await window.$setDoc(window.$doc(window.$db,'viewUsers',cred.user.uid),{
      email,role:'view',createdAt:Date.now(),createdBy:window.$user.email
    });
    if(msg)msg.textContent='✅ User created: '+email;
    document.getElementById('new-user-email').value='';
    document.getElementById('new-user-pass').value='';
    // Refresh list
    setTimeout(showUserMgmt,800);
  }catch(e){
    if(msg)msg.textContent='Error: '+(e.code==='auth/email-already-in-use'?'Email already exists':e.message);
  }
}
window._addViewUser=_addViewUser;

async function _delViewUser(uid,email){
  if(!confirm('Delete user: '+email+'?'))return;
  try{
    await window.$deleteDoc(window.$doc(window.$db,'viewUsers',uid));
    showToast('🗑 User deleted');
    setTimeout(showUserMgmt,500);
  }catch(e){showToast('Error: '+e.message);}
}
window._delViewUser=_delViewUser;

loadProducts();loadMapping();loadStockMapping();loadSH();loadRP();loadNWCTypes();load();loadFormulas();migrateCompact();
